<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Player IDP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-mid: #1A2E44; --navy-light: #243B55;
  --teal: #1B8A6B; --teal-light: #22A882; --teal-faint: #0D2E25;
  --amber: #D4870A; --amber-light: #F0A020; --amber-faint: #2E1E05;
  --text: #EDF2F7; --text-muted: #94A3B8; --text-dim: #64748B;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --red-light: #E05050;
}
html, body { min-height: 100vh; background: var(--navy); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 15px; }

/* ─── NAV ─── */
.topnav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 56px;
  border-bottom: 1px solid var(--border); background: var(--navy);
  position: sticky; top: 0; z-index: 100;
}
.nav-brand { font-family: 'Barlow Condensed', sans-serif; font-size: 20px;
  font-weight: 800; color: var(--text); }
.nav-brand span { color: var(--teal-light); }
.nav-right { display: flex; align-items: center; gap: 14px; }
.nav-name { font-size: 13px; color: var(--text-muted); }
.nav-btn {
  font-size: 12px; font-weight: 600; color: var(--text-dim);
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 11px; cursor: pointer; font-family: 'Inter', sans-serif;
  transition: color 0.2s, border-color 0.2s;
}
.nav-btn:hover { color: var(--text-muted); border-color: var(--border-strong); }

/* ─── PAGE ─── */
.page { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2rem;
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px; font-weight: 800;
}
.page-title span { color: var(--text-dim); font-weight: 600; font-size: 24px; margin-left: 10px; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 8px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: var(--teal-light); }
.btn-ghost { background: transparent; color: var(--text-dim);
  border: 1px solid var(--border-strong); }
.btn-ghost:hover { color: var(--text-muted); border-color: var(--border-strong); }

/* ─── SEARCH ─── */
.search-bar-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 0 14px; margin-bottom: 1.5rem;
  transition: border-color .2s;
}
.search-bar-wrap:focus-within { border-color: var(--teal); }
.search-bar-wrap svg { flex-shrink: 0; opacity: .4; pointer-events: none; }
.search-bar-wrap input {
  flex: 1; background: transparent; border: none;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 11px 0; outline: none;
}
.search-bar-wrap input::placeholder { color: var(--text-dim); }

/* ─── RESULTS SECTION LABEL ─── */
.results-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 10px; margin-top: .25rem;
}
/* ─── PLAYER RESULT ROWS ─── */
.player-results { display: flex; flex-direction: column; gap: 6px; margin-top: 1.75rem; }
.player-result-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 12px 16px; text-decoration: none;
  transition: border-color .15s;
}
.player-result-row:hover { border-color: rgba(34,168,130,.4); }
.pr-name { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
.pr-pos  { font-size: 12px; color: var(--text-dim); }
.pr-team { font-size: 12px; color: var(--text-muted);
  background: var(--navy-light); border: 1px solid var(--border-strong);
  border-radius: 4px; padding: 2px 8px; white-space: nowrap; }
.pr-arrow { font-size: 12px; color: var(--text-dim); }

/* ─── TEAM GRID ─── */
.team-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.team-card {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 12px; padding: 1.4rem;
  display: flex; flex-direction: column; gap: 14px;
  transition: border-color 0.2s;
}
.team-card:hover { border-color: rgba(34,168,130,0.35); }

.team-card-header { display: flex; flex-direction: column; gap: 4px; }
.team-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800; color: var(--text);
}
.team-season { font-size: 12px; color: var(--text-dim); }
.team-meta { font-size: 12px; color: var(--text-muted); }

.team-card-footer { display: flex; gap: 8px; align-items: center; }
.btn-sm {
  padding: 6px 14px; border-radius: 6px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-sm-primary { background: var(--teal-faint); color: var(--teal-light);
  border: 1px solid rgba(27,138,107,0.35); }
.btn-sm-primary:hover { border-color: var(--teal); }
.btn-sm-ghost { background: transparent; color: var(--text-dim);
  border: 1px solid var(--border); }
.btn-sm-ghost:hover { color: var(--text-muted); }
.btn-sm-danger { background: transparent; color: var(--red-light);
  border: 1px solid rgba(224,80,80,0.25); margin-left: auto; }
.btn-sm-danger:hover { background: rgba(224,80,80,0.08); border-color: rgba(224,80,80,0.5); }

/* ─── STATS BAR ─── */
.stats-bar {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
  margin-bottom: 1.5rem;
}
.stat-block {
  background: var(--navy-mid); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px;
}
.stat-block .val {
  font-family: 'Barlow Condensed', sans-serif; font-size: 30px;
  font-weight: 800; color: var(--text); line-height: 1;
}
.stat-block .lbl {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: .08em; margin-top: 4px; font-weight: 600;
}

/* ─── DUE REVIEW STAT — clickable ─── */
#statDueBlock { cursor: pointer; transition: border-color .15s, background .15s; }
#statDueBlock:hover { background: var(--navy-light); border-color: rgba(212,135,10,.45); }

/* ─── DUE REVIEW PANEL ─── */
.due-modal {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 14px; width: 100%; max-width: 640px;
  max-height: 82vh; display: flex; flex-direction: column;
}
.due-modal-head {
  padding: 1.5rem 1.75rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.due-modal-head h2 {
  font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800;
}
.due-modal-head .due-count-badge {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  background: var(--amber-faint); color: var(--amber-light);
  border: 1px solid rgba(212,135,10,.35); border-radius: 6px; padding: 3px 10px;
}
.due-modal-body { overflow-y: auto; padding: 1rem 1.75rem 1.5rem; flex: 1; }
.due-close {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px;
  transition: color .15s;
}
.due-close:hover { color: var(--text); }

/* ─── TEAM ACCORDION ─── */
.team-accordion { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.team-accordion-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; background: var(--navy);
  transition: background .15s; user-select: none;
}
.team-accordion-head:hover { background: var(--navy-light); }
.team-acc-left { display: flex; align-items: center; gap: 10px; }
.team-acc-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
  font-weight: 700; color: var(--text);
}
.team-acc-badge {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  background: var(--amber-faint); color: var(--amber-light);
  border: 1px solid rgba(212,135,10,.3); border-radius: 4px; padding: 2px 8px;
}
.team-acc-chevron { color: var(--text-dim); font-size: 12px; transition: transform .2s; }
.team-accordion-head.open .team-acc-chevron { transform: rotate(180deg); }
.team-accordion-body { display: none; border-top: 1px solid var(--border); }
.team-accordion-body.open { display: block; }
.due-player-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 12px;
}
.due-player-row:last-child { border-bottom: none; }
.due-player-info { flex: 1; }
.due-player-name { font-size: 14px; font-weight: 600; color: var(--text); }
.due-player-date { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.btn-generate-due {
  padding: 5px 13px; border-radius: 6px; border: 1px solid rgba(27,138,107,.35);
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; cursor: pointer;
  background: var(--teal-faint); color: var(--teal-light); white-space: nowrap;
  transition: border-color .15s;
}
.btn-generate-due:hover { border-color: var(--teal); }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 10px 20px; font-size: 13px;
  color: var(--teal-light); z-index: 999; opacity: 0;
  transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ─── EMPTY STATE ─── */
.empty { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
.empty-icon {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 48px; font-weight: 800; opacity: 0.2; margin-bottom: 1rem;
}
.empty p { font-size: 14px; line-height: 1.6; max-width: 280px; margin: 0 auto 1.5rem; }

/* ─── MODAL ─── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 2rem; width: 100%; max-width: 420px;
  display: flex; flex-direction: column; gap: 16px;
}
.modal h2 { font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em; }
input[type="text"] {
  background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 10px 13px; width: 100%; outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--teal); }
input::placeholder { color: var(--text-dim); }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; padding: 11px 16px; }
.modal-status { font-size: 12px; color: var(--text-dim); min-height: 16px; }
.btn-danger { background: #8B1A1A; color: #FCA5A5; border: 1px solid rgba(224,80,80,0.4); }
.btn-danger:hover { background: #A32020; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="sidebarMount"></div>

<div class="main-content">
<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">My Teams</div>
      <div id="dashSubtitle" style="font-size:13px;color:var(--text-dim);margin-top:4px;display:none;">
        Your assigned teams · <a href="teams.html" style="color:var(--teal-light);text-decoration:none;">Browse all teams →</a>
      </div>
    </div>
    <button class="btn btn-primary" id="addTeamBtn" onclick="openAddTeam()">+ Add Team</button>
  </div>

  <div class="stats-bar">
    <div class="stat-block"><div class="val" id="statPlayers">—</div><div class="lbl">Total Players</div></div>
    <div class="stat-block"><div class="val" id="statIDPs">—</div><div class="lbl">IDPs Generated</div></div>
    <div class="stat-block" id="statDueBlock" onclick="openDueReviewPanel()" title="Click to see players due for review"><div class="val" id="statDueReview">—</div><div class="lbl">Due for Review ↗</div></div>
  </div>

  <div class="search-bar-wrap">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none">
      <circle cx="6" cy="6" r="4.5" stroke="#94A3B8" stroke-width="1.5"/>
      <path d="M9.5 9.5L12 12" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="globalSearch" placeholder="Search teams or players…" oninput="runSearch()" />
  </div>

  <div id="teamsSection">
    <div class="team-grid" id="teamGrid">
      <div class="empty" id="loadingState">
        <div class="empty-icon">IDP</div>
        <p>Loading your teams…</p>
      </div>
    </div>
  </div>

  <div id="playerResults"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<!-- DUE FOR REVIEW PANEL -->
<div class="overlay" id="dueReviewModal">
  <div class="due-modal">
    <div class="due-modal-head">
      <div style="display:flex;align-items:center;gap:12px;">
        <h2>⏰ Due for Review</h2>
        <span class="due-count-badge" id="dueCountBadge"></span>
      </div>
      <button class="due-close" onclick="closeDueReviewPanel()">✕</button>
    </div>
    <div class="due-modal-body" id="dueReviewBody">
      <div style="font-size:13px;color:var(--text-dim);padding:1rem 0;">Loading…</div>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="overlay" id="deleteConfirmModal">
  <div class="modal" style="max-width:400px;">
    <h2 style="color:var(--red-light);">Delete Team?</h2>
    <p id="deleteConfirmMsg" style="font-size:14px;color:var(--text-muted);line-height:1.6;"></p>
    <p style="font-size:12px;color:var(--text-dim);">All players on this team will also be permanently removed.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<!-- ADD TEAM MODAL -->
<div class="overlay" id="addTeamModal">
  <div class="modal">
    <h2>Add Team</h2>
    <div class="field">
      <label>Team Name</label>
      <input type="text" id="teamName" placeholder="e.g. U14 Boys Blue"
             onkeydown="if(event.key==='Enter') saveTeam()" />
    </div>
    <div class="field">
      <label>Season (optional)</label>
      <input type="text" id="teamSeason" placeholder="e.g. Fall 2026"
             onkeydown="if(event.key==='Enter') saveTeam()" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddTeam()">Cancel</button>
      <button class="btn btn-primary" id="saveTeamBtn" onclick="saveTeam()">Create Team</button>
    </div>
    <div class="modal-status" id="addTeamStatus"></div>
  </div>
</div>

<script>
let coachId    = null;
let myRole     = 'coach';
let allPlayers = [];   // populated after teams load for combined search

(async () => {
  const ctx = await requireCoach();
  if (!ctx) return;
  coachId = ctx.session.user.id;
  myRole  = ctx.profile.role;
  await renderSidebar('dashboard');
  // Show subtitle + hide Add Team button for non-admins
  if (myRole !== 'admin') {
    document.getElementById('dashSubtitle').style.display = 'block';
    document.getElementById('addTeamBtn').style.display   = 'none';
  }
  loadTeams();
  loadAllPlayers();   // background — no await
  loadStats();        // background — no await
})();

async function loadStats() {
  const { data: allTeams } = await sb.from('teams').select('id');
  const teamIds = (allTeams || []).map(t => t.id);
  if (!teamIds.length) {
    document.getElementById('statPlayers').textContent  = '0';
    document.getElementById('statIDPs').textContent     = '0';
    document.getElementById('statDueReview').textContent = '0';
    return;
  }
  const { data: players } = await sb.from('players').select('id').in('team_id', teamIds);
  const playerCount = (players || []).length;
  document.getElementById('statPlayers').textContent = playerCount;
  if (!playerCount) {
    document.getElementById('statIDPs').textContent      = '0';
    document.getElementById('statDueReview').textContent = '0';
    return;
  }
  const playerIds = players.map(p => p.id);

  // Fetch IDPs, review threshold, and player details in parallel
  const [idpRes, reviewRes, playerDetailRes, teamRes] = await Promise.all([
    sb.from('idps').select('id, player_id, updated_at').in('player_id', playerIds),
    sb.from('settings').select('value').eq('key', 'idp_review_days').maybeSingle(),
    sb.from('players').select('id, name, team_id').in('id', playerIds),
    sb.from('teams').select('id, name').in('id', teamIds)
  ]);
  const idps       = idpRes.data || [];
  const reviewDays = parseInt(reviewRes.data?.value || '60');
  const cutoff     = new Date();
  cutoff.setDate(cutoff.getDate() - reviewDays);

  document.getElementById('statIDPs').textContent = idps.length;

  // Latest IDP date per player
  const latestByPlayer = {};
  idps.forEach(i => {
    const cur = latestByPlayer[i.player_id];
    if (!cur || new Date(i.updated_at) > new Date(cur)) latestByPlayer[i.player_id] = i.updated_at;
  });

  // Build due players list with names + team info
  const playerMap = {};
  (playerDetailRes.data || []).forEach(p => { playerMap[p.id] = p; });
  const teamNameMap = {};
  (teamRes.data || []).forEach(t => { teamNameMap[t.id] = t.name; });

  duePlayers = playerIds
    .filter(pid => {
      const latest = latestByPlayer[pid];
      return !latest || new Date(latest) < cutoff;
    })
    .map(pid => {
      const p = playerMap[pid] || {};
      return {
        id:        pid,
        name:      p.name || 'Unknown',
        team_id:   p.team_id,
        team_name: p.team_id ? (teamNameMap[p.team_id] || 'Unknown Team') : 'No Team',
        last_idp:  latestByPlayer[pid] || null,
      };
    })
    .sort((a, b) => a.team_name.localeCompare(b.team_name) || a.name.localeCompare(b.name));

  const dueCount = duePlayers.length;
  const dueEl    = document.getElementById('statDueReview');
  const dueBlock = document.getElementById('statDueBlock');
  dueEl.textContent = dueCount;
  if (dueCount > 0) {
    dueEl.style.color          = 'var(--amber-light)';
    dueBlock.style.borderColor = 'rgba(212,135,10,.35)';
  }
}

// ─── DUE FOR REVIEW PANEL ─────────────────────────────────────────────────
let duePlayers = [];

function openDueReviewPanel() {
  const modal = document.getElementById('dueReviewModal');
  modal.classList.add('open');
  renderDueReviewPanel();
}

function closeDueReviewPanel() {
  document.getElementById('dueReviewModal').classList.remove('open');
}
document.getElementById('dueReviewModal').addEventListener('click', function(e) {
  if (e.target === this) closeDueReviewPanel();
});

function renderDueReviewPanel() {
  const body = document.getElementById('dueReviewBody');
  const badge = document.getElementById('dueCountBadge');
  badge.textContent = duePlayers.length + ' player' + (duePlayers.length !== 1 ? 's' : '');

  if (duePlayers.length === 0) {
    body.innerHTML = `<div style="text-align:center;padding:2.5rem 1rem;color:var(--text-dim);">
      <div style="font-size:32px;margin-bottom:.75rem;">✓</div>
      <div style="font-size:14px;">All players are up to date!</div>
    </div>`;
    return;
  }

  // Group by team
  const byTeam = {};
  duePlayers.forEach(p => {
    const key = p.team_id || '__none__';
    if (!byTeam[key]) byTeam[key] = { name: p.team_name, team_id: p.team_id, players: [] };
    byTeam[key].players.push(p);
  });

  let html = '';
  Object.values(byTeam).forEach((team, idx) => {
    const accId = 'acc-' + idx;
    html += `
    <div class="team-accordion">
      <div class="team-accordion-head" id="${accId}-head" onclick="toggleAccordion('${accId}')">
        <div class="team-acc-left">
          <div class="team-acc-name">${esc(team.name)}</div>
          <div class="team-acc-badge">${team.players.length} player${team.players.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="team-acc-chevron">▼</div>
      </div>
      <div class="team-accordion-body" id="${accId}-body">`;

    team.players.forEach(p => {
      const dateStr = p.last_idp
        ? 'Last IDP: ' + new Date(p.last_idp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : 'No IDP yet';
      const genHref = `/generate.html?player=${p.id}${team.team_id ? '&team=' + team.team_id : ''}`;
      const viewHref = `/view-idp.html?player=${p.id}${team.team_id ? '&team=' + team.team_id : ''}`;
      html += `
        <div class="due-player-row">
          <div class="due-player-info">
            <div class="due-player-name">${esc(p.name)}</div>
            <div class="due-player-date">${dateStr}</div>
          </div>
          <div style="display:flex;gap:6px;">
            <a href="${viewHref}" class="btn-generate-due" style="background:transparent;color:var(--text-dim);border-color:var(--border-strong);">View</a>
            <a href="${genHref}" class="btn-generate-due">Generate IDP</a>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  body.innerHTML = html;
}

function toggleAccordion(id) {
  const head = document.getElementById(id + '-head');
  const body = document.getElementById(id + '-body');
  const isOpen = body.classList.contains('open');
  head.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadAllPlayers() {
  // Simple select without embedded join to avoid FK-dependency issues
  const { data, error } = await sb
    .from('players')
    .select('id, name, positions, team_id')
    .order('name');

  if (error || !data) { allPlayers = []; return; }

  // Fetch team names separately for all unique team_ids
  const teamIds = [...new Set(data.filter(p => p.team_id).map(p => p.team_id))];
  const teamNameMap = {};
  if (teamIds.length > 0) {
    const { data: teams } = await sb.from('teams').select('id, name').in('id', teamIds);
    (teams || []).forEach(t => { teamNameMap[t.id] = t.name; });
  }

  allPlayers = data.map(p => ({
    ...p,
    teamName: p.team_id ? (teamNameMap[p.team_id] || null) : null
  }));

  // Re-run search if the user already typed something before data arrived
  const q = document.getElementById('globalSearch')?.value;
  if (q && q.trim()) runSearch();
}

async function loadTeams() {
  const grid = document.getElementById('teamGrid');
  let teams = [];

  if (myRole === 'admin') {
    // Admins see every team
    const { data } = await sb.from('teams').select('id, name, season').order('name');
    teams = data || [];
  } else {
    // Coaches only see teams they are assigned to
    const { data: links } = await sb
      .from('coach_teams').select('team_id, teams(id, name, season)').eq('coach_id', coachId);
    teams = (links || []).map(l => l.teams).filter(Boolean)
      .sort((a, b) => a.name.localeCompare(b.name));
  }

  if (!teams || teams.length === 0) {
    const emptyMsg = myRole === 'admin'
      ? `<p>No teams yet. Add your first team to get started.</p>
         <button class="btn btn-primary" onclick="openAddTeam()">+ Add Team</button>`
      : `<p>You haven't been assigned to any teams yet.</p>
         <p style="font-size:13px;color:var(--text-dim);margin-top:.5rem;">Ask your admin to assign you, or visit
           <a href="teams.html" style="color:var(--teal-light);">All Teams</a> to browse and link yourself.</p>`;
    grid.innerHTML = `<div class="empty"><div class="empty-icon">IDP</div>${emptyMsg}</div>`;
    window._allTeams = []; window._countMap = {};
    return;
  }

  // Fetch player counts per team
  const teamIds = teams.map(t => t.id);
  const { data: players } = await sb
    .from('players')
    .select('team_id')
    .in('team_id', teamIds);

  const countMap = {};
  (players || []).forEach(p => { countMap[p.team_id] = (countMap[p.team_id] || 0) + 1; });

  window._allTeams = teams;
  window._countMap = countMap;
  renderTeamCards(teams, countMap);
}

function renderTeamCards(teams, countMap) {
  const grid = document.getElementById('teamGrid');
  if (!teams || teams.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">IDP</div><p>No teams found.</p></div>`;
    return;
  }
  grid.innerHTML = teams.map(t => {
    const count = countMap[t.id] || 0;
    return `
      <div class="team-card">
        <div class="team-card-header">
          <div class="team-name">${esc(t.name)}</div>
          ${t.season ? `<div class="team-season">${esc(t.season)}</div>` : ''}
        </div>
        <div class="team-meta">${count} player${count !== 1 ? 's' : ''}</div>
        <div class="team-card-footer">
          <button class="btn-sm btn-sm-primary" onclick="viewTeam('${t.id}')">View Team →</button>
          <button class="btn-sm btn-sm-danger" onclick="deleteTeam('${t.id}','${esc(t.name)}')">Delete</button>
        </div>
      </div>`;
  }).join('');
}

function runSearch() {
  const q = document.getElementById('globalSearch').value.toLowerCase().trim();

  // ── Teams ──────────────────────────────────────────
  if (window._allTeams) {
    const filteredTeams = q
      ? window._allTeams.filter(t =>
          t.name.toLowerCase().includes(q) ||
          (t.season||'').toLowerCase().includes(q))
      : window._allTeams;

    // Show/hide label only when searching
    const teamsSection = document.getElementById('teamsSection');
    if (q) {
      if (!teamsSection.querySelector('.results-label')) {
        teamsSection.insertAdjacentHTML('afterbegin',
          '<div class="results-label" id="teamsLabel"></div>');
      }
      document.getElementById('teamsLabel').textContent =
        `Teams (${filteredTeams.length})`;
    } else {
      const lbl = document.getElementById('teamsLabel');
      if (lbl) lbl.remove();
    }
    renderTeamCards(filteredTeams, window._countMap || {});
  }

  // ── Players ────────────────────────────────────────
  const prDiv = document.getElementById('playerResults');
  if (!q) { prDiv.innerHTML = ''; return; }

  const filteredPlayers = allPlayers.filter(p =>
    p.name.toLowerCase().includes(q) ||
    (p.positions||'').toLowerCase().includes(q) ||
    (p.teamName||'').toLowerCase().includes(q)
  );

  if (filteredPlayers.length === 0) { prDiv.innerHTML = ''; return; }

  prDiv.innerHTML = `
    <div class="results-label">Players (${filteredPlayers.length})</div>
    <div class="player-results">
      ${filteredPlayers.map(p => {
        const teamId = p.team_id || '';
        return `
          <a class="player-result-row" href="/view-idp.html?player=${p.id}&team=${teamId}">
            <span class="pr-name">${esc(p.name)}</span>
            ${p.positions ? `<span class="pr-pos">${esc(p.positions)}</span>` : ''}
            ${p.teamName ? `<span class="pr-team">${esc(p.teamName)}</span>` : ''}
            <span class="pr-arrow">→</span>
          </a>`;
      }).join('')}
    </div>`;
}

function viewTeam(id) {
  const base = window.location.pathname.replace(/\/[^/]*$/, '');
  window.location.href = `${base}/team.html?team=${id}`;
}

let _pendingDeleteId   = null;
let _pendingDeleteName = null;

function deleteTeam(id, name) {
  _pendingDeleteId   = id;
  _pendingDeleteName = name;
  document.getElementById('deleteConfirmMsg').textContent =
    `Are you sure you want to delete "${name}"?`;
  document.getElementById('confirmDeleteBtn').disabled = false;
  document.getElementById('confirmDeleteBtn').textContent = 'Yes, Delete';
  document.getElementById('deleteConfirmModal').classList.add('open');
}

function closeDeleteConfirm() {
  document.getElementById('deleteConfirmModal').classList.remove('open');
  _pendingDeleteId = _pendingDeleteName = null;
}

document.getElementById('deleteConfirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteConfirm();
});

async function confirmDelete() {
  if (!_pendingDeleteId) return;
  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  await sb.from('players').delete().eq('team_id', _pendingDeleteId);
  await sb.from('coach_teams').delete().eq('team_id', _pendingDeleteId);
  await sb.from('teams').delete().eq('id', _pendingDeleteId);

  window._allTeams = (window._allTeams || []).filter(t => t.id !== _pendingDeleteId);
  if (window._countMap) delete window._countMap[_pendingDeleteId];
  closeDeleteConfirm();
  renderTeamCards(window._allTeams, window._countMap || {});
  loadStats();
  showToast('Team deleted');
}

function openAddTeam() {
  document.getElementById('teamName').value = '';
  document.getElementById('teamSeason').value = '';
  document.getElementById('addTeamStatus').textContent = '';
  document.getElementById('addTeamModal').classList.add('open');
  setTimeout(() => document.getElementById('teamName').focus(), 80);
}

function closeAddTeam() {
  document.getElementById('addTeamModal').classList.remove('open');
}

document.getElementById('addTeamModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddTeam();
});

async function saveTeam() {
  const name   = document.getElementById('teamName').value.trim();
  const season = document.getElementById('teamSeason').value.trim();
  if (!name) { document.getElementById('addTeamStatus').textContent = 'Team name is required.'; return; }

  const btn = document.getElementById('saveTeamBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  // Get fresh session token explicitly
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('addTeamStatus').textContent = 'Session expired — please sign in again.';
    btn.disabled = false; btn.textContent = 'Create Team';
    window.location.href = '/login.html';
    return;
  }

  // Insert team via direct fetch with explicit Authorization header
  const res = await fetch(`${SUPABASE_URL}/rest/v1/teams`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({ name, season: season || null })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    document.getElementById('addTeamStatus').textContent = 'Error: ' + (err.message || res.status);
    btn.disabled = false; btn.textContent = 'Create Team';
    return;
  }

  const rows = await res.json();
  const team = Array.isArray(rows) ? rows[0] : rows;

  // Assign this coach to the team
  await sb.from('coach_teams').insert({ coach_id: coachId, team_id: team.id });

  btn.disabled = false; btn.textContent = 'Create Team';
  closeAddTeam();
  loadTeams();
  loadStats();
  showToast('Team created ✓');
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
