<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player IDPs — Player IDP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-mid: #1A2E44; --navy-light: #243B55;
  --teal: #1B8A6B; --teal-light: #22A882; --teal-faint: #0D2E25;
  --amber: #D4870A; --amber-light: #F0A020; --amber-faint: #2E1E05;
  --text: #EDF2F7; --text-muted: #A8B8CC; --text-dim: #64748B;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --red-light: #E05050;
}
html, body { min-height: 100vh; background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; }

.page { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 4rem; }

/* Breadcrumb */
.breadcrumb { font-size: 13px; color: var(--text-dim); margin-bottom: 1.5rem; }
.breadcrumb a { color: var(--teal-light); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { margin: 0 6px; }

/* Player header */
.player-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;
}
.player-name { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.1; }
.player-pos  { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 8px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: background .15s; text-decoration: none; white-space: nowrap;
}
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: var(--teal-light); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
.btn-ghost:hover { color: var(--text-muted); }
.btn-sm { padding: 6px 12px; font-size: 11px; }

/* ─── IDP LIST ─── */
.idp-list-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim);
  margin-bottom: 10px;
}
.idp-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }

.idp-list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border-radius: 10px;
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  cursor: pointer; transition: border-color .15s, background .15s;
  position: relative;
}
.idp-list-item:hover { border-color: rgba(34,168,130,.4); }
.idp-list-item.selected {
  border-color: var(--teal); background: rgba(27,138,107,.08);
}
.idp-list-item.selected::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--teal); border-radius: 10px 0 0 10px;
}
.item-icon {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.item-icon.published { background: var(--teal-faint); }
.item-icon.draft     { background: var(--amber-faint); }
.item-body { flex: 1; min-width: 0; }
.item-date  { font-size: 14px; font-weight: 600; color: var(--text); }
.item-focus { font-size: 12px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.status-chip {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
  padding: 3px 9px; border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
}
.status-chip.published { background: var(--teal-faint);  color: var(--teal-light); border: 1px solid rgba(27,138,107,.3); }
.status-chip.draft     { background: var(--amber-faint); color: var(--amber-light); border: 1px solid rgba(212,135,10,.25); }
.item-arrow { color: var(--text-dim); font-size: 12px; flex-shrink: 0; }
.idp-list-item.selected .item-arrow { color: var(--teal-light); }

/* ─── IDP VIEWER ─── */
.idp-viewer { display: none; }
.idp-viewer.visible { display: block; }
.viewer-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px;
  padding: 12px 16px; background: var(--navy-mid); border-radius: 10px;
  border: 1px solid var(--border-strong);
}
.viewer-info { display: flex; align-items: center; gap: 10px; }
.viewer-date { font-size: 13px; font-weight: 600; color: var(--text-muted); }
.viewer-actions { display: flex; gap: 8px; }

/* ─── IDP INFOGRAPHIC — IMPROVED READABILITY ─── */
.idp-card {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 12px; padding: 2.25rem; font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* Header */
.ig-header {
  display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 1rem;
  padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,.1);
  margin-bottom: 1.75rem;
}
.ig-player-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800;
  line-height: 1; color: var(--text);
}
.ig-player-name em { color: var(--teal-light); font-style: normal; }
.ig-sub {
  font-size: 13px; color: var(--text-dim); margin-top: 6px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
}
.ig-pos-badge {
  display: inline-block; background: var(--teal-faint); border: 1px solid var(--teal);
  color: var(--teal-light); font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 5px;
}
.ig-phase { display: block; font-size: 12px; color: var(--text-dim); margin-top: 7px;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: .08em; text-transform: uppercase; text-align: right; }

/* Stats row */
.ig-stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.75rem;
}
.ig-stat {
  background: var(--navy-light); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 14px 16px;
}
.ig-stat-val {
  font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700;
  color: var(--text); line-height: 1.2;
}
.ig-stat-lbl {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: .08em; margin-top: 4px; font-weight: 600;
}

/* Section labels */
.ig-sec-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 10px; margin-top: 1.75rem;
}
.ig-divider { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 1.75rem 0 0; }

/* Strength/improvement cards */
.ig-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ig-card {
  border-radius: 10px; padding: 14px 16px; border: 1px solid rgba(255,255,255,.07);
}
.ig-card.green { background: #0D2214; border-color: rgba(56,160,80,.25); }
.ig-card.amber { background: #2E1E05; border-color: rgba(212,135,10,.25); }
.ig-card h4 {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 7px;
}
.ig-card .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ig-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

/* Plan rows */
.ig-plan-list { display: flex; flex-direction: column; gap: 8px; }
.ig-plan-item {
  display: grid; grid-template-columns: 110px 1fr;
  border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,.07);
}
.ig-plan-badge {
  display: flex; align-items: center; justify-content: center; text-align: center;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; padding: 12px 8px; line-height: 1.4;
}
.ig-plan-badge.purple { background: #1A1230; color: #7357C8; border-right: 1px solid rgba(115,87,200,.2); }
.ig-plan-badge.amber  { background: #2E1E05; color: #F0A020; border-right: 1px solid rgba(212,135,10,.2); }
.ig-plan-badge.teal   { background: #0D2E25; color: #22A882; border-right: 1px solid rgba(27,138,107,.2); }
.ig-plan-badge.blue   { background: #0D1E2E; color: #60A5FA; border-right: 1px solid rgba(96,165,250,.2); }
.ig-plan-content { background: var(--navy-light); padding: 12px 16px; }
.ig-plan-content h4 {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--text); margin-bottom: 6px;
}
.ig-plan-content ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.ig-plan-content ul li {
  font-size: 13px; color: var(--text-muted); display: flex; gap: 8px;
  align-items: flex-start; line-height: 1.55;
}
.ig-plan-content ul li::before { content: '—'; color: var(--text-dim); flex-shrink: 0; }

/* Micro habits */
.ig-micro-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: #60A5FA;
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px; margin-top: 1.75rem;
}
.ig-micro-label::after { content: ''; flex: 1; height: 1px; background: rgba(96,165,250,.2); }
.ig-micro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.ig-micro-card {
  background: #0D1E2E; border: 1px solid rgba(96,165,250,.2);
  border-radius: 10px; padding: 14px; text-align: center;
}
.ig-micro-num { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: #60A5FA; line-height: 1; }
.ig-micro-desc { font-size: 12px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }

/* Game day */
.ig-gameday {
  background: var(--navy-light); border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px; padding: 14px 18px; display: flex; align-items: center;
  gap: 14px; margin-top: 10px;
}
.ig-gameday-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); white-space: nowrap;
}
.ig-gameday-text { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
.ig-gameday-text em { color: var(--teal-light); font-style: normal; }

/* Goal banner */
.ig-goal {
  background: var(--teal-faint); border: 1px solid rgba(27,138,107,.35);
  border-radius: 10px; padding: 18px 20px; margin-top: 10px;
  display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: center;
}
.ig-goal-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--teal-light); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap;
}
.ig-goal p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

/* Parent note */
.ig-parent-note {
  margin-top: 1.5rem; border-left: 3px solid rgba(255,255,255,.12);
  padding: 12px 18px; background: var(--navy-light); border-radius: 0 10px 10px 0;
}
.ig-parent-note-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px;
}
.ig-parent-note p { font-size: 13px; color: var(--text-muted); line-height: 1.7; font-style: italic; }

/* ─── DIFF / COMPARE ─── */
.diff-panel {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
}
.diff-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.diff-panel-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim);
}
.diff-close {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 2px 5px; border-radius: 4px;
  transition: color .15s;
}
.diff-close:hover { color: var(--text); }
.diff-row { display: flex; flex-direction: column; gap: 6px; }
.diff-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; padding: 7px 10px; border-radius: 6px;
  background: var(--navy); border: 1px solid var(--border);
}
.diff-item.added   { background: #0D2214; border-color: rgba(56,160,80,.25); }
.diff-item.removed { background: #2E1E05; border-color: rgba(212,135,10,.25); }
.diff-item.changed { background: #0D1E2E; border-color: rgba(96,165,250,.2); }
.diff-tag {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px;
  border-radius: 3px; flex-shrink: 0; margin-top: 1px;
}
.diff-tag.added   { background: rgba(56,160,80,.15);  color: #38A050; }
.diff-tag.removed { background: rgba(212,135,10,.15); color: #F0A020; }
.diff-tag.changed { background: rgba(96,165,250,.15); color: #60A5FA; }
.diff-text { color: var(--text-muted); line-height: 1.5; }
.diff-text em { color: var(--text); font-style: normal; font-weight: 600; }

/* Empty / spinner */
.empty { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
.empty-icon { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; opacity: .2; margin-bottom: 1rem; }
.spinner { display: block; width: 32px; height: 32px; border: 3px solid var(--border-strong); border-top-color: var(--teal-light); border-radius: 50%; animation: spin .7s linear infinite; margin: 5rem auto; }
@keyframes spin { to { transform: rotate(360deg); } }

@media print {
  .main-content { margin-left: 0 !important; }
  .idp-sidebar, .sb-topbar, .breadcrumb, .player-header, .idp-list, .idp-list-label, .viewer-toolbar { display: none !important; }
  .idp-viewer { display: block !important; }
  body, html { background: #0D1B2A; }
}
@media (max-width: 640px) {
  .ig-stats { grid-template-columns: 1fr 1fr; }
  .ig-card-grid { grid-template-columns: 1fr; }
  .ig-micro-grid { grid-template-columns: 1fr; }
  .idp-list-item { flex-wrap: wrap; }
}
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 9px 20px; font-size: 13px;
  color: var(--teal-light); z-index: 999; opacity: 0;
  transition: opacity .2s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ─── TABS ─── */
.tab-nav {
  display: flex; gap: 4px; margin-bottom: 1.75rem;
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 4px;
}
.tab-btn {
  flex: 1; padding: 9px 16px; border: none; border-radius: 7px;
  background: transparent; color: var(--text-dim);
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  cursor: pointer; transition: background .15s, color .15s;
}
.tab-btn:hover { color: var(--text-muted); }
.tab-btn.active { background: var(--navy); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── PROGRESS TRACKER ─── */
.progress-need-more {
  text-align: center; padding: 3rem 2rem; color: var(--text-dim);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; font-size: 14px; line-height: 1.7;
}
.progress-need-more strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; }
.progress-timeline { position: relative; padding-left: 36px; }
.progress-timeline::before {
  content: ''; position: absolute; left: 12px; top: 20px;
  bottom: 20px; width: 2px; background: var(--border-strong);
}
.pt-entry { position: relative; margin-bottom: 18px; }
.pt-dot {
  position: absolute; left: -34px; top: 16px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--teal); border: 2px solid var(--navy); z-index: 1;
}
.pt-dot.latest { background: var(--teal-light); box-shadow: 0 0 0 4px rgba(34,168,130,.2); }
.pt-card {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 16px 18px; transition: border-color .15s;
}
.pt-card:hover { border-color: rgba(34,168,130,.3); }
.pt-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.pt-date { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
.pt-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pt-focus {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--teal-light);
  font-family: 'Barlow Condensed', sans-serif;
  background: var(--teal-faint); border: 1px solid rgba(27,138,107,.3);
  padding: 3px 9px; border-radius: 4px;
}
.pt-delta {
  font-size: 11px; font-weight: 700; letter-spacing: .05em;
  font-family: 'Barlow Condensed', sans-serif;
  padding: 3px 9px; border-radius: 4px;
}
.pt-delta.up   { background: rgba(56,160,80,.15);  color: #38A050; }
.pt-delta.down { background: rgba(224,80,80,.15);  color: #E05050; }
.pt-delta.same { background: rgba(255,255,255,.06); color: var(--text-dim); }
.pt-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.pt-tag {
  font-size: 12px; padding: 4px 10px; border-radius: 5px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: .04em;
}
.pt-tag.strength    { background: #0D2214; color: #38A050; border: 1px solid rgba(56,160,80,.2); }
.pt-tag.improvement { background: #2E1E05; color: #F0A020; border: 1px solid rgba(212,135,10,.2); }
.pt-mantra { font-size: 13px; color: var(--text-dim); font-style: italic; padding-top: 10px; border-top: 1px solid var(--border); }
.pt-link-btn {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase; color: var(--teal-light);
  background: none; border: none; cursor: pointer; padding: 0; margin-top: 8px;
  display: block; opacity: .75; transition: opacity .15s;
}
.pt-link-btn:hover { opacity: 1; }

/* ─── COACH NOTES ─── */
.notes-compose {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 16px 18px; margin-bottom: 1.5rem;
}
.notes-compose-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
}
.notes-textarea {
  width: 100%; background: var(--navy); border: 1px solid var(--border-strong);
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
  padding: 12px 14px; border-radius: 8px; resize: vertical; min-height: 80px;
  line-height: 1.6; transition: border-color .15s;
}
.notes-textarea:focus { outline: none; border-color: var(--teal); }
.notes-textarea::placeholder { color: var(--text-dim); }
.notes-compose-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
.notes-list { display: flex; flex-direction: column; gap: 10px; }
.note-item {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 14px 16px;
}
.note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.note-date {
  font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif;
}
.note-delete {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: color .15s; line-height: 1;
}
.note-delete:hover { color: var(--red-light); }
.note-body { font-size: 14px; color: var(--text-muted); line-height: 1.7; white-space: pre-wrap; }
.notes-empty {
  text-align: center; padding: 2.5rem 2rem; color: var(--text-dim);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; font-size: 14px;
}
</style>
</head>
<body>
<div id="sidebarMount"></div>
<div class="main-content">
<div class="page" id="pageRoot">
  <div class="spinner"></div>
</div>
</div>
<div id="toast" class="toast"></div>

<script>
const params   = new URLSearchParams(window.location.search);
const playerId = params.get('player');
const teamId   = params.get('team');

let allIDPs        = [];
let allNotes       = [];
let playerData     = null;
let currentCoachId = null;

if (!playerId) window.location.href = '/dashboard.html';

(async () => {
  const ctx = await requireCoach();
  if (!ctx) return;
  currentCoachId = ctx.id;
  await renderSidebar('');

  const { data: player } = await sb.from('players').select('*').eq('id', playerId).single();
  if (!player) { window.location.href = '/dashboard.html'; return; }
  playerData = player;

  const [idpRes, notesRes] = await Promise.all([
    sb.from('idps').select('*').eq('player_id', playerId).order('updated_at', { ascending: false }),
    sb.from('player_notes').select('*').eq('player_id', playerId)
      .eq('coach_id', currentCoachId).order('created_at', { ascending: false })
  ]);
  allIDPs  = idpRes.data  || [];
  allNotes = notesRes.data || [];

  renderPage();
})();

function renderPage() {
  const root = document.getElementById('pageRoot');
  const notesCount = allNotes.length;
  const idpCount   = allIDPs.length;

  const idpTabLabel   = idpCount   ? `IDPs (${idpCount})`   : 'IDPs';
  const notesTabLabel = notesCount ? `Coach Notes (${notesCount})` : 'Coach Notes';

  root.innerHTML = `
    <div class="breadcrumb">
      <a href="/dashboard.html">My Teams</a>
      <span>›</span>
      ${teamId ? `<a href="/team.html?team=${teamId}">Team</a><span>›</span>` : ''}
      <span>${esc(playerData.name)}</span>
    </div>

    <div class="player-header">
      <div>
        <div class="player-name">${esc(playerData.name)}</div>
        ${playerData.positions ? `<div class="player-pos">${esc(playerData.positions)}</div>` : ''}
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="window.print()">⬒ Print / PDF</button>
        <a href="/generate.html?player=${playerId}${teamId ? '&team='+teamId : ''}"
           class="btn btn-primary">✦ Generate New IDP</a>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="tab-btn-idps"     onclick="showTab('idps')">${idpTabLabel}</button>
      <button class="tab-btn"        id="tab-btn-progress" onclick="showTab('progress')">Progress</button>
      <button class="tab-btn"        id="tab-btn-notes"    onclick="showTab('notes')">${notesTabLabel}</button>
    </div>

    <div id="panel-idps" class="tab-panel active">
      ${idpCount === 0 ? `
        <div class="empty">
          <div class="empty-icon">IDP</div>
          <p>No IDPs yet for this player.</p>
          <a href="/generate.html?player=${playerId}${teamId ? '&team='+teamId : ''}"
             class="btn btn-primary" style="margin-top:1rem;display:inline-flex;">
            ✦ Generate First IDP
          </a>
        </div>` : `
        <div class="idp-list-label">${idpCount} IDP${idpCount !== 1 ? 's' : ''} — select one to view</div>
        <div class="idp-list" id="idpList">
          ${allIDPs.map((idp, i) => `
            <div class="idp-list-item ${i === 0 ? 'selected' : ''}" id="item-${i}" onclick="selectIDP(${i})">
              <div class="item-icon ${idp.published ? 'published' : 'draft'}">
                ${idp.published ? '✓' : '✎'}
              </div>
              <div class="item-body">
                <div class="item-date">${formatDate(idp.updated_at)}</div>
                <div class="item-focus">${idp.data?.focus ? 'Focus: ' + esc(idp.data.focus) : 'Development Plan'}</div>
              </div>
              <div class="item-badges">
                <span class="status-chip ${idp.published ? 'published' : 'draft'}">
                  ${idp.published ? 'Published' : 'Draft'}
                </span>
              </div>
              <span class="item-arrow">▶</span>
            </div>`).join('')}
        </div>
        <div class="idp-viewer visible" id="idpViewer">
          ${renderViewer(allIDPs[0], 0)}
        </div>
      `}
    </div>

    <div id="panel-progress" class="tab-panel">
      ${renderProgressTab()}
    </div>

    <div id="panel-notes" class="tab-panel">
      ${renderNotesTab()}
    </div>
  `;
}

function showTab(tab) {
  ['idps','progress','notes'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
  });
}

function renderProgressTab() {
  if (allIDPs.length < 2) {
    return `<div class="progress-need-more">
      <strong>Not enough data yet</strong>
      Generate at least 2 IDPs to see how this player is progressing over time.
    </div>`;
  }

  // Show oldest → newest so the timeline reads upward in time
  const chrono = [...allIDPs].reverse();

  const entries = chrono.map((idp, i) => {
    const prev = i > 0 ? chrono[i - 1] : null;
    const currStrengths  = idp.data?.strengths   || [];
    const currImprovs    = idp.data?.improvements || [];
    const prevStrengths  = prev ? (prev.data?.strengths || []) : null;

    let deltaHtml = '';
    if (prevStrengths !== null) {
      const diff = currStrengths.length - prevStrengths.length;
      if (diff > 0)      deltaHtml = `<span class="pt-delta up">▲ +${diff} strength${diff > 1 ? 's' : ''}</span>`;
      else if (diff < 0) deltaHtml = `<span class="pt-delta down">▼ ${Math.abs(diff)} strength${Math.abs(diff) > 1 ? 's' : ''} fewer</span>`;
      else               deltaHtml = `<span class="pt-delta same">— same strengths</span>`;
    }

    const strengthTags = currStrengths.slice(0, 4).map(s =>
      `<span class="pt-tag strength">✦ ${esc(s.title)}</span>`).join('');
    const improvTags = currImprovs.slice(0, 4).map(s =>
      `<span class="pt-tag improvement">▲ ${esc(s.title)}</span>`).join('');

    const isLatest = i === chrono.length - 1;
    const origIdx  = allIDPs.indexOf(idp); // index in allIDPs (newest-first) for selectIDP()

    return `
      <div class="pt-entry">
        <div class="pt-dot ${isLatest ? 'latest' : ''}"></div>
        <div class="pt-card">
          <div class="pt-card-header">
            <div class="pt-date">${formatDate(idp.updated_at)}${isLatest ? ' <span style="font-size:11px;color:var(--teal-light);margin-left:6px;">Latest</span>' : ''}</div>
            <div class="pt-badges">
              ${idp.data?.focus ? `<span class="pt-focus">${esc(idp.data.focus)}</span>` : ''}
              ${deltaHtml}
            </div>
          </div>
          <div class="pt-tags">${strengthTags}${improvTags}</div>
          ${idp.data?.mantra ? `<div class="pt-mantra">"${esc(idp.data.mantra)}"</div>` : ''}
          <button class="pt-link-btn" onclick="showTab('idps');selectIDP(${origIdx})">View full IDP →</button>
        </div>
      </div>
    `;
  }).join('');

  return `<div class="progress-timeline">${entries}</div>`;
}

function renderNotesTab() {
  const noteItems = allNotes.map(note => `
    <div class="note-item" id="note-${note.id}">
      <div class="note-header">
        <div class="note-date">${formatNoteDate(note.created_at)}</div>
        <button class="note-delete" onclick="deleteNote('${note.id}')" title="Delete note">×</button>
      </div>
      <div class="note-body">${esc(note.content)}</div>
    </div>
  `).join('');

  return `
    <div class="notes-compose">
      <div class="notes-compose-label">📝 Add coaching note</div>
      <textarea class="notes-textarea" id="noteInput"
        placeholder="Observations, match notes, injury flags, attitude check-ins… only visible to you."
        rows="3"></textarea>
      <div class="notes-compose-footer">
        <button class="btn btn-primary" onclick="addNote()">+ Add Note</button>
      </div>
    </div>
    <div class="notes-list" id="notesList">
      ${allNotes.length === 0
        ? '<div class="notes-empty">No notes yet. Add your first coaching observation above.</div>'
        : noteItems}
    </div>
  `;
}

function formatNoteDate(iso) {
  return new Date(iso).toLocaleString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric',
    year: 'numeric', hour: '2-digit', minute: '2-digit'
  });
}

async function addNote() {
  const input = document.getElementById('noteInput');
  if (!input) return;
  const content = input.value.trim();
  if (!content) { input.focus(); return; }

  input.disabled = true;
  const { data, error } = await sb.from('player_notes').insert({
    player_id: playerId,
    coach_id: currentCoachId,
    content
  }).select().single();
  input.disabled = false;

  if (error) { showToast('Failed to save note'); return; }

  allNotes.unshift(data);
  input.value = '';

  const list = document.getElementById('notesList');
  if (list) {
    if (list.querySelector('.notes-empty')) list.innerHTML = '';
    list.insertAdjacentHTML('afterbegin', `
      <div class="note-item" id="note-${data.id}">
        <div class="note-header">
          <div class="note-date">${formatNoteDate(data.created_at)}</div>
          <button class="note-delete" onclick="deleteNote('${data.id}')" title="Delete note">×</button>
        </div>
        <div class="note-body">${esc(data.content)}</div>
      </div>
    `);
  }

  const tabBtn = document.getElementById('tab-btn-notes');
  if (tabBtn) tabBtn.textContent = `Coach Notes (${allNotes.length})`;
  showToast('Note saved ✓');
}

async function deleteNote(noteId) {
  if (!confirm('Delete this note? This cannot be undone.')) return;
  const { error } = await sb.from('player_notes').delete().eq('id', noteId);
  if (error) { showToast('Failed to delete note'); return; }

  allNotes = allNotes.filter(n => n.id !== noteId);
  const el = document.getElementById('note-' + noteId);
  if (el) el.remove();

  const list = document.getElementById('notesList');
  if (list && !list.querySelector('.note-item')) {
    list.innerHTML = '<div class="notes-empty">No notes yet. Add your first coaching observation above.</div>';
  }

  const tabBtn = document.getElementById('tab-btn-notes');
  if (tabBtn) tabBtn.textContent = allNotes.length ? `Coach Notes (${allNotes.length})` : 'Coach Notes';
  showToast('Note deleted');
}

function selectIDP(idx) {
  document.querySelectorAll('.idp-list-item').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('idpViewer').innerHTML = renderViewer(allIDPs[idx], idx);
  document.getElementById('idpViewer').classList.add('visible');
  document.getElementById('idpViewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderViewer(idp, idx) {
  const date     = formatDate(idp.updated_at);
  const prevIDP  = allIDPs[idx + 1] || null;
  const showDiff = prevIDP && prevIDP.data;
  return `
    <div class="viewer-toolbar">
      <div class="viewer-info">
        <span class="status-chip ${idp.published ? 'published' : 'draft'}">
          ${idp.published ? '✓ Published' : 'Draft'}
        </span>
        <span class="viewer-date">${date}</span>
      </div>
      <div class="viewer-actions">
        ${showDiff ? `<button class="btn btn-ghost btn-sm" id="compareBtn-${idx}" onclick="toggleDiff(${idx})">⇄ What Changed</button>` : ''}
        <a href="/generate.html?idp=${idp.id}&player=${idp.player_id}${teamId ? '&team='+teamId : ''}"
           class="btn btn-ghost btn-sm">✎ Edit</a>
        ${idp.published
          ? `<button class="btn btn-ghost btn-sm" onclick="shareIDP('${idp.id}', ${idx})">🔗 Share with Player</button>`
          : `<button class="btn btn-primary btn-sm" onclick="publishIDP('${idp.id}', ${idx})">⬆ Publish</button>`}
      </div>
    </div>
    ${showDiff ? `<div class="diff-panel" id="diffPanel-${idx}" style="display:none;">${buildDiff(prevIDP.data, idp.data)}</div>` : ''}
    <div class="idp-card">
      ${buildInfographic(idp.data)}
    </div>
  `;
}

function toggleDiff(idx) {
  const panel = document.getElementById('diffPanel-' + idx);
  const btn   = document.getElementById('compareBtn-' + idx);
  if (!panel) return;
  const showing = panel.style.display !== 'none';
  panel.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? '⇄ What Changed' : '⇄ Hide Changes';
}

function buildDiff(prev, curr) {
  const items = [];

  // Focus change
  if ((prev.focus || '') !== (curr.focus || '')) {
    items.push({ type: 'changed', label: 'Focus', text: esc(prev.focus || '—') + ' → <em>' + esc(curr.focus || '—') + '</em>' });
  }

  // Mantra change
  if ((prev.mantra || '') !== (curr.mantra || '')) {
    items.push({ type: 'changed', label: 'Mantra', text: esc(prev.mantra || '—') + ' → <em>' + esc(curr.mantra || '—') + '</em>' });
  }

  // Strengths — titles added or removed
  const prevStrengths = (prev.strengths || []).map(s => s.title);
  const currStrengths = (curr.strengths || []).map(s => s.title);
  currStrengths.filter(t => !prevStrengths.includes(t)).forEach(t => {
    items.push({ type: 'added', label: 'New strength', text: '<em>' + esc(t) + '</em>' });
  });
  prevStrengths.filter(t => !currStrengths.includes(t)).forEach(t => {
    items.push({ type: 'removed', label: 'Strength removed', text: esc(t) });
  });

  // Improvements — titles added, resolved, or carried over
  const prevImprov = (prev.improvements || []).map(s => s.title);
  const currImprov = (curr.improvements || []).map(s => s.title);
  prevImprov.filter(t => !currImprov.includes(t)).forEach(t => {
    items.push({ type: 'added', label: 'Resolved', text: '<em>' + esc(t) + '</em>' });
  });
  currImprov.filter(t => !prevImprov.includes(t)).forEach(t => {
    items.push({ type: 'removed', label: 'New focus area', text: '<em>' + esc(t) + '</em>' });
  });

  // Duration change
  if ((prev.duration || '') !== (curr.duration || '')) {
    items.push({ type: 'changed', label: 'Duration', text: esc(prev.duration || '—') + ' → <em>' + esc(curr.duration || '—') + '</em>' });
  }

  if (items.length === 0) {
    return '<div class="diff-panel-header"><div class="diff-panel-title">What Changed</div><button class="diff-close" onclick="toggleDiff(0)">×</button></div>' +
      '<div style="font-size:13px;color:var(--text-dim);">No structural changes detected between these two IDPs.</div>';
  }

  const prevDate = formatDate(allIDPs.find(i => i.data === prev)?.updated_at || '');
  const header = '<div class="diff-panel-header">' +
    '<div class="diff-panel-title">What Changed <span style="font-weight:400;text-transform:none;letter-spacing:0;font-family:\'Inter\',sans-serif;font-size:11px;margin-left:6px;">vs ' + esc(prevDate) + '</span></div>' +
    '</div>';

  const rows = items.map(item =>
    '<div class="diff-item ' + item.type + '">' +
      '<span class="diff-tag ' + item.type + '">' + esc(item.label) + '</span>' +
      '<span class="diff-text">' + item.text + '</span>' +
    '</div>'
  ).join('');

  return header + '<div class="diff-row">' + rows + '</div>';
}

async function publishIDP(idpId, idx) {
  const { error } = await sb.from('idps').update({ published: true, updated_at: new Date().toISOString() }).eq('id', idpId);
  if (!error) {
    allIDPs[idx].published = true;
    // Refresh list item badge
    const chip = document.querySelector(`#item-${idx} .status-chip`);
    const icon = document.querySelector(`#item-${idx} .item-icon`);
    if (chip) { chip.className = 'status-chip published'; chip.textContent = 'Published'; }
    if (icon) { icon.className = 'item-icon published'; icon.textContent = '✓'; }
    // Refresh viewer
    document.getElementById('idpViewer').innerHTML = renderViewer(allIDPs[idx], idx);
  }
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
}

function buildInfographic(d) {
  if (!d) return '<p style="color:var(--text-dim);padding:2rem;text-align:center;">No data available.</p>';

  const sc = (d.strengths || []).map(s =>
    `<div class="ig-card green">
       <h4><span class="dot" style="background:#38A050;"></span>${esc(s.title)}</h4>
       <p>${esc(s.body)}</p>
     </div>`).join('');

  const ic = (d.improvements || []).map(s =>
    `<div class="ig-card amber">
       <h4><span class="dot" style="background:#F0A020;"></span>${esc(s.title)}</h4>
       <p>${esc(s.body)}</p>
     </div>`).join('');

  const pr = (d.plan || []).map(p =>
    `<div class="ig-plan-item">
       <div class="ig-plan-badge ${p.badgeType || 'purple'}">${esc(p.badge)}</div>
       <div class="ig-plan-content">
         <h4>${esc(p.title)}</h4>
         <ul>${(p.bullets || []).map(b => `<li>${esc(b)}</li>`).join('')}</ul>
       </div>
     </div>`).join('');

  const mc = (d.microHabits || []).map(m =>
    `<div class="ig-micro-card">
       <div class="ig-micro-num">${esc(m.num)}</div>
       <div class="ig-micro-desc">${esc(m.desc)}</div>
     </div>`).join('');

  const gdParts = (d.gameDayFocus || '').split('—');
  const gdText  = gdParts.length > 1
    ? `<em>${esc(gdParts[0].trim())}</em> — ${esc(gdParts[1].trim())}`
    : esc(d.gameDayFocus || '');

  return `
    <div class="ig-header">
      <div>
        <div class="ig-player-name">${esc(d.playerName || 'Player')} <em>IDP</em></div>
        <div class="ig-sub">Individual Development Plan · Coaching Staff</div>
      </div>
      <div style="text-align:right;">
        <div class="ig-pos-badge">${esc(d.position || 'Field Player')}</div>
        <span class="ig-phase">Phase: ${esc(d.focus || 'Development')}</span>
      </div>
    </div>

    <div class="ig-stats">
      <div class="ig-stat"><div class="ig-stat-val">Development</div><div class="ig-stat-lbl">Current Phase</div></div>
      <div class="ig-stat"><div class="ig-stat-val">${esc(d.focus || '—')}</div><div class="ig-stat-lbl">Focus Area</div></div>
      <div class="ig-stat"><div class="ig-stat-val">${esc(d.duration || '12 months')}</div><div class="ig-stat-lbl">Plan Duration</div></div>
      <div class="ig-stat"><div class="ig-stat-val">${esc(d.mantra || 'Play with intent')}</div><div class="ig-stat-lbl">Player Mantra</div></div>
    </div>

    <div class="ig-sec-label">✦ Strengths — keep building on these</div>
    <div class="ig-card-grid">${sc}</div>

    <hr class="ig-divider">
    <div class="ig-sec-label">▲ Areas to improve</div>
    <div class="ig-card-grid">${ic}</div>

    <hr class="ig-divider">
    <div class="ig-sec-label">📋 Development plan</div>
    <div class="ig-plan-list">${pr}</div>

    <div class="ig-micro-label">Home micro-habits — daily</div>
    <div class="ig-micro-grid">${mc}</div>

    <div class="ig-gameday">
      <div class="ig-gameday-label">Game Day Focus</div>
      <div class="ig-gameday-text">${gdText}</div>
    </div>

    <div class="ig-sec-label" style="margin-top:1.75rem;">🎯 12-Month Goal</div>
    <div class="ig-goal">
      <div class="ig-goal-label">12-Month<br>Vision</div>
      <p>${esc(d.goalVision || '')}</p>
    </div>

    <div class="ig-parent-note">
      <div class="ig-parent-note-label">Note for parents</div>
      <p>${esc(d.parentNote || '')}</p>
    </div>
  `;
}

// ── Share with Player ────────────────────────────────────────────────────
function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

async function shareIDP(idpId, idx) {
  let token = allIDPs[idx].share_token;
  if (!token) {
    token = generateUUID();
    const { error } = await sb.from('idps').update({ share_token: token }).eq('id', idpId);
    if (error) { showToast('Failed to create link'); return; }
    allIDPs[idx].share_token = token;
  }
  const url = `${window.location.origin}/player-view.html?token=${token}`;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Player link copied! ✓');
  } catch {
    prompt('Copy this link for the player:', url);
  }
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
