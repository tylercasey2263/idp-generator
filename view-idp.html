<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player IDPs — Player IDP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-mid: #1A2E44; --navy-light: #243B55;
  --teal: #1B8A6B; --teal-light: #22A882; --teal-faint: #0D2E25;
  --amber: #D4870A; --amber-light: #F0A020; --amber-faint: #2E1E05;
  --text: #EDF2F7; --text-muted: #A8B8CC; --text-dim: #64748B;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --red-light: #E05050;
}
html, body { min-height: 100vh; background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; }

.page { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 4rem; }

/* Breadcrumb */
.breadcrumb { font-size: 13px; color: var(--text-dim); margin-bottom: 1.5rem; }
.breadcrumb a { color: var(--teal-light); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { margin: 0 6px; }

/* Player header */
.player-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;
}
.player-name { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.1; }
.player-pos  { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
.player-team-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: var(--teal-light);
  background: var(--teal-faint); border: 1px solid rgba(27,138,107,.3);
  border-radius: 5px; padding: 3px 9px; text-decoration: none;
  margin-right: 5px; transition: border-color .15s;
}
.player-team-chip:hover { border-color: var(--teal-light); }
.player-notes-preview {
  font-size: 13px; color: var(--text-dim); margin-top: 8px;
  font-style: italic; max-width: 480px; line-height: 1.55;
}
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 8px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: background .15s; text-decoration: none; white-space: nowrap;
}
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: var(--teal-light); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
.btn-ghost:hover { color: var(--text-muted); }
.btn-sm { padding: 6px 12px; font-size: 11px; }

/* ─── IDP LIST ─── */
.idp-list-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim);
  margin-bottom: 10px;
}
.idp-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }

.idp-list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border-radius: 10px;
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  cursor: pointer; transition: border-color .15s, background .15s;
  position: relative;
}
.idp-list-item:hover { border-color: rgba(34,168,130,.4); }
.idp-list-item.selected {
  border-color: var(--teal); background: rgba(27,138,107,.08);
}
.idp-list-item.selected::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--teal); border-radius: 10px 0 0 10px;
}
.item-icon {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.item-icon.published { background: var(--teal-faint); }
.item-icon.draft     { background: var(--amber-faint); }
.item-body { flex: 1; min-width: 0; }
.item-date  { font-size: 14px; font-weight: 600; color: var(--text); }
.item-focus { font-size: 12px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.status-chip {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
  padding: 3px 9px; border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
}
.status-chip.published { background: var(--teal-faint);  color: var(--teal-light); border: 1px solid rgba(27,138,107,.3); }
.status-chip.draft     { background: var(--amber-faint); color: var(--amber-light); border: 1px solid rgba(212,135,10,.25); }
.item-arrow { color: var(--text-dim); font-size: 12px; flex-shrink: 0; }
.idp-list-item.selected .item-arrow { color: var(--teal-light); }

/* ─── IDP VIEWER ─── */
.idp-viewer { display: none; }
.idp-viewer.visible { display: block; }
.viewer-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px;
  padding: 12px 16px; background: var(--navy-mid); border-radius: 10px;
  border: 1px solid var(--border-strong);
}
.viewer-info { display: flex; align-items: center; gap: 10px; }
.viewer-date { font-size: 13px; font-weight: 600; color: var(--text-muted); }
.viewer-actions { display: flex; gap: 8px; }

/* ─── IDP INFOGRAPHIC — IMPROVED READABILITY ─── */
.idp-card {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 12px; padding: 2.25rem; font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* Header */
.ig-header {
  display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 1rem;
  padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,.1);
  margin-bottom: 1.75rem;
}
.ig-player-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800;
  line-height: 1; color: var(--text);
}
.ig-player-name em { color: var(--teal-light); font-style: normal; }
.ig-sub {
  font-size: 13px; color: var(--text-dim); margin-top: 6px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
}
.ig-pos-badge {
  display: inline-block; background: var(--teal-faint); border: 1px solid var(--teal);
  color: var(--teal-light); font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 5px;
}
.ig-phase { display: block; font-size: 12px; color: var(--text-dim); margin-top: 7px;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: .08em; text-transform: uppercase; text-align: right; }

/* Stats row */
.ig-stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.75rem;
}
.ig-stat {
  background: var(--navy-light); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 14px 16px;
}
.ig-stat-val {
  font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700;
  color: var(--text); line-height: 1.2;
}
.ig-stat-lbl {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: .08em; margin-top: 4px; font-weight: 600;
}

/* Section labels */
.ig-sec-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 10px; margin-top: 1.75rem;
}
.ig-divider { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 1.75rem 0 0; }

/* Strength/improvement cards */
.ig-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ig-card {
  border-radius: 10px; padding: 14px 16px; border: 1px solid rgba(255,255,255,.07);
}
.ig-card.green { background: #0D2214; border-color: rgba(56,160,80,.25); }
.ig-card.amber { background: #2E1E05; border-color: rgba(212,135,10,.25); }
.ig-card h4 {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 7px;
}
.ig-card .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ig-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

/* Plan rows */
.ig-plan-list { display: flex; flex-direction: column; gap: 8px; }
.ig-plan-item {
  display: grid; grid-template-columns: 110px 1fr;
  border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,.07);
}
.ig-plan-badge {
  display: flex; align-items: center; justify-content: center; text-align: center;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; padding: 12px 8px; line-height: 1.4;
}
.ig-plan-badge.purple { background: #1A1230; color: #7357C8; border-right: 1px solid rgba(115,87,200,.2); }
.ig-plan-badge.amber  { background: #2E1E05; color: #F0A020; border-right: 1px solid rgba(212,135,10,.2); }
.ig-plan-badge.teal   { background: #0D2E25; color: #22A882; border-right: 1px solid rgba(27,138,107,.2); }
.ig-plan-badge.blue   { background: #0D1E2E; color: #60A5FA; border-right: 1px solid rgba(96,165,250,.2); }
.ig-plan-content { background: var(--navy-light); padding: 12px 16px; }
.ig-plan-content h4 {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--text); margin-bottom: 6px;
}
.ig-plan-content ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.ig-plan-content ul li {
  font-size: 13px; color: var(--text-muted); display: flex; gap: 8px;
  align-items: flex-start; line-height: 1.55;
}
.ig-plan-content ul li::before { content: '—'; color: var(--text-dim); flex-shrink: 0; }

/* Micro habits */
.ig-micro-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: #60A5FA;
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px; margin-top: 1.75rem;
}
.ig-micro-label::after { content: ''; flex: 1; height: 1px; background: rgba(96,165,250,.2); }
.ig-micro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.ig-micro-card {
  background: #0D1E2E; border: 1px solid rgba(96,165,250,.2);
  border-radius: 10px; padding: 14px; text-align: center;
}
.ig-micro-num { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: #60A5FA; line-height: 1; }
.ig-micro-desc { font-size: 12px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }

/* Game day */
.ig-gameday {
  background: var(--navy-light); border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px; padding: 14px 18px; display: flex; align-items: center;
  gap: 14px; margin-top: 10px;
}
.ig-gameday-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); white-space: nowrap;
}
.ig-gameday-text { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
.ig-gameday-text em { color: var(--teal-light); font-style: normal; }

/* Goal banner */
.ig-goal {
  background: var(--teal-faint); border: 1px solid rgba(27,138,107,.35);
  border-radius: 10px; padding: 18px 20px; margin-top: 10px;
  display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: center;
}
.ig-goal-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--teal-light); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap;
}
.ig-goal p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

/* Parent note */
.ig-parent-note {
  margin-top: 1.5rem; border-left: 3px solid rgba(255,255,255,.12);
  padding: 12px 18px; background: var(--navy-light); border-radius: 0 10px 10px 0;
}
/* ─── PLAYER PHOTO ─── */
.player-photo {
  width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
  background: var(--teal-faint); border: 2px solid rgba(27,138,107,.3);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700;
  color: var(--teal-light); cursor: pointer; position: relative;
  transition: border-color .15s;
}
.player-photo:hover { border-color: var(--teal); }
.player-photo img { width: 100%; height: 100%; object-fit: cover; }
.player-photo-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .15s; font-size: 11px; color: #fff;
  border-radius: 50%;
}
.player-photo:hover .player-photo-overlay { opacity: 1; }

.ig-parent-note-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px;
}
.ig-parent-note p { font-size: 13px; color: var(--text-muted); line-height: 1.7; font-style: italic; }

/* ─── DIFF / COMPARE ─── */
.diff-panel {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
}
.diff-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.diff-panel-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim);
}
.diff-close {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 2px 5px; border-radius: 4px;
  transition: color .15s;
}
.diff-close:hover { color: var(--text); }
.diff-row { display: flex; flex-direction: column; gap: 6px; }
.diff-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; padding: 7px 10px; border-radius: 6px;
  background: var(--navy); border: 1px solid var(--border);
}
.diff-item.added   { background: #0D2214; border-color: rgba(56,160,80,.25); }
.diff-item.removed { background: #2E1E05; border-color: rgba(212,135,10,.25); }
.diff-item.changed { background: #0D1E2E; border-color: rgba(96,165,250,.2); }
.diff-tag {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px;
  border-radius: 3px; flex-shrink: 0; margin-top: 1px;
}
.diff-tag.added   { background: rgba(56,160,80,.15);  color: #38A050; }
.diff-tag.removed { background: rgba(212,135,10,.15); color: #F0A020; }
.diff-tag.changed { background: rgba(96,165,250,.15); color: #60A5FA; }
.diff-text { color: var(--text-muted); line-height: 1.5; }
.diff-text em { color: var(--text); font-style: normal; font-weight: 600; }

/* Empty / spinner */
.empty { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
.empty-icon { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; opacity: .2; margin-bottom: 1rem; }
.spinner { display: block; width: 32px; height: 32px; border: 3px solid var(--border-strong); border-top-color: var(--teal-light); border-radius: 50%; animation: spin .7s linear infinite; margin: 5rem auto; }
@keyframes spin { to { transform: rotate(360deg); } }

@media print {
  .main-content { margin-left: 0 !important; }
  .idp-sidebar, .sb-topbar, .breadcrumb, .player-header, .idp-list, .idp-list-label, .viewer-toolbar { display: none !important; }
  .idp-viewer { display: block !important; }
  body, html { background: #0D1B2A; }
}
@media (max-width: 640px) {
  .ig-stats { grid-template-columns: 1fr 1fr; }
  .ig-card-grid { grid-template-columns: 1fr; }
  .ig-micro-grid { grid-template-columns: 1fr; }
  .idp-list-item { flex-wrap: wrap; }
}
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 9px 20px; font-size: 13px;
  color: var(--teal-light); z-index: 999; opacity: 0;
  transition: opacity .2s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ─── SHARE MODAL ─── */
.share-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 900; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.share-overlay.open { opacity: 1; pointer-events: all; }
.share-modal {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 28px 28px 22px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5); transform: translateY(8px);
  transition: transform .2s;
}
.share-overlay.open .share-modal { transform: translateY(0); }
.share-modal-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700;
  color: var(--text); margin-bottom: 6px;
}
.share-modal-sub {
  font-size: 12px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5;
}
.share-url-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
}
.share-url-box {
  flex: 1; background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 9px 12px; font-size: 12px; color: var(--text-muted);
  font-family: 'Inter', monospace; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
.share-copy-btn {
  flex-shrink: 0; background: var(--teal); border: none; border-radius: 8px;
  color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .06em; padding: 9px 16px; cursor: pointer;
  transition: background .15s;
}
.share-copy-btn:hover { background: #1BA87F; }
.share-copy-btn.copied { background: #2A6E52; }
.share-actions {
  display: flex; gap: 8px; margin-top: 4px;
}
.share-email-btn {
  flex: 1; background: transparent; border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text-muted); font-family: 'Inter', sans-serif;
  font-size: 13px; padding: 9px 14px; cursor: pointer; text-align: center;
  text-decoration: none; display: flex; align-items: center; justify-content: center;
  gap: 6px; transition: border-color .15s, color .15s;
}
.share-email-btn:hover { border-color: var(--teal); color: var(--teal-light); }
.share-done-btn {
  background: transparent; border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text-dim); font-family: 'Inter', sans-serif;
  font-size: 13px; padding: 9px 20px; cursor: pointer; transition: border-color .15s;
}
.share-done-btn:hover { border-color: var(--border-strong); color: var(--text); }

/* ─── TABS ─── */
.tab-nav {
  display: flex; gap: 4px; margin-bottom: 1.75rem;
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 4px;
}
.tab-btn {
  flex: 1; padding: 9px 16px; border: none; border-radius: 7px;
  background: transparent; color: var(--text-dim);
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  cursor: pointer; transition: background .15s, color .15s;
}
.tab-btn:hover { color: var(--text-muted); }
.tab-btn.active { background: var(--navy); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── PROGRESS TRACKER ─── */
.progress-need-more {
  text-align: center; padding: 3rem 2rem; color: var(--text-dim);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; font-size: 14px; line-height: 1.7;
}
.progress-need-more strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; }
.progress-timeline { position: relative; padding-left: 36px; }
.progress-timeline::before {
  content: ''; position: absolute; left: 12px; top: 20px;
  bottom: 20px; width: 2px; background: var(--border-strong);
}
.pt-entry { position: relative; margin-bottom: 18px; }
.pt-dot {
  position: absolute; left: -34px; top: 16px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--teal); border: 2px solid var(--navy); z-index: 1;
}
.pt-dot.latest { background: var(--teal-light); box-shadow: 0 0 0 4px rgba(34,168,130,.2); }
.pt-card {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 16px 18px; transition: border-color .15s;
}
.pt-card:hover { border-color: rgba(34,168,130,.3); }
.pt-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.pt-date { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
.pt-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pt-focus {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--teal-light);
  font-family: 'Barlow Condensed', sans-serif;
  background: var(--teal-faint); border: 1px solid rgba(27,138,107,.3);
  padding: 3px 9px; border-radius: 4px;
}
.pt-delta {
  font-size: 11px; font-weight: 700; letter-spacing: .05em;
  font-family: 'Barlow Condensed', sans-serif;
  padding: 3px 9px; border-radius: 4px;
}
.pt-delta.up   { background: rgba(56,160,80,.15);  color: #38A050; }
.pt-delta.down { background: rgba(224,80,80,.15);  color: #E05050; }
.pt-delta.same { background: rgba(255,255,255,.06); color: var(--text-dim); }
.pt-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.pt-tag {
  font-size: 12px; padding: 4px 10px; border-radius: 5px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: .04em;
}
.pt-tag.strength    { background: #0D2214; color: #38A050; border: 1px solid rgba(56,160,80,.2); }
.pt-tag.improvement { background: #2E1E05; color: #F0A020; border: 1px solid rgba(212,135,10,.2); }
.pt-mantra { font-size: 13px; color: var(--text-dim); font-style: italic; padding-top: 10px; border-top: 1px solid var(--border); }
.pt-link-btn {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase; color: var(--teal-light);
  background: none; border: none; cursor: pointer; padding: 0; margin-top: 8px;
  display: block; opacity: .75; transition: opacity .15s;
}
.pt-link-btn:hover { opacity: 1; }

/* ─── COACH NOTES ─── */
.notes-compose {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 16px 18px; margin-bottom: 1.5rem;
}
.notes-compose-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
}
.notes-textarea {
  width: 100%; background: var(--navy); border: 1px solid var(--border-strong);
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
  padding: 12px 14px; border-radius: 8px; resize: vertical; min-height: 80px;
  line-height: 1.6; transition: border-color .15s;
}
.notes-textarea:focus { outline: none; border-color: var(--teal); }
.notes-textarea::placeholder { color: var(--text-dim); }
.notes-compose-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
.notes-list { display: flex; flex-direction: column; gap: 10px; }
.note-item {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 14px 16px;
}
.note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.note-date {
  font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif;
}
.note-delete {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: color .15s; line-height: 1;
}
.note-delete:hover { color: var(--red-light); }
.note-body { font-size: 14px; color: var(--text-muted); line-height: 1.7; white-space: pre-wrap; }
.notes-empty {
  text-align: center; padding: 2.5rem 2rem; color: var(--text-dim);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; font-size: 14px;
}

/* ─── LEAGUE RESULTS (Season tab) ─── */
.standing-card {
  background: var(--navy-mid); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
  display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px;
}
.standing-pos {
  font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800;
  color: var(--teal-light); line-height: 1; min-width: 32px; text-align: center;
}
.standing-team { font-size: 14px; font-weight: 600; color: var(--text); }
.standing-div { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.standing-stats { display: flex; gap: 12px; align-items: center; }
.stat-pill { text-align: center; }
.stat-pill .sp-val {
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; line-height: 1;
}
.stat-pill .sp-lbl {
  font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; margin-top: 1px;
}
.stat-pill.wins .sp-val { color: var(--teal-light); }
.stat-pill.losses .sp-val { color: #E05050; }
.stat-pill.draws .sp-val { color: var(--amber-light); }
.stat-pill.pts .sp-val { color: var(--text); }
/* ── Match Results collapsible header ── */
.results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: .75rem; margin-bottom: 8px; cursor: pointer; user-select: none;
}
.results-header:hover .results-label { color: var(--text-muted); }
.results-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); transition: color .15s;
}
.results-chevron { font-size: 10px; color: var(--text-dim); transition: transform .2s; }
.results-chevron.collapsed { transform: rotate(-90deg); }
.results-body.results-hidden { display: none; }

.results-list { display: flex; flex-direction: column; gap: 5px; }

/* ── Individual result row — flat, all info visible ── */
.result-row {
  background: var(--navy-mid); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
  display: grid;
  grid-template-columns: 80px 1fr auto auto auto;
  align-items: center; gap: 10px; padding: 9px 14px;
  transition: border-color .15s;
}
.result-row:hover { border-color: var(--border-strong); }

/* Column: Date */
.result-date {
  font-size: 11px; color: var(--text-dim);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600; letter-spacing: .03em; line-height: 1.3; white-space: nowrap;
}
/* Column: Opponent */
.result-opp { font-size: 13px; color: var(--text-muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* Column: Home/Away badge */
.result-ha {
  font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  font-family: 'Barlow Condensed', sans-serif;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap;
}
.result-ha.home { background: var(--teal-faint); color: var(--teal-light); border: 1px solid rgba(27,138,107,.25); }
.result-ha.away { background: var(--navy-light); color: var(--text-dim); border: 1px solid var(--border-strong); }
/* Column: Score */
.result-score {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--text); white-space: nowrap; min-width: 36px; text-align: right;
}
/* Column: W/L/D badge */
.result-badge {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .06em; padding: 2px 8px; border-radius: 4px;
  min-width: 24px; text-align: center; white-space: nowrap;
}
.result-badge.W { background: var(--teal-faint);       color: var(--teal-light);  border: 1px solid rgba(27,138,107,.3); }
.result-badge.L { background: rgba(224,80,80,.08);     color: #E05050;            border: 1px solid rgba(224,80,80,.25); }
.result-badge.D { background: var(--amber-faint);      color: var(--amber-light); border: 1px solid rgba(212,135,10,.25); }
.result-badge.U { background: transparent;             color: var(--text-dim);    border: 1px solid var(--border); }
.season-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
.season-meta a { color: var(--teal-light); text-decoration: none; }
.season-meta a:hover { text-decoration: underline; }

/* ─── PARENT FEEDBACK TAB ─── */
.feedback-unread-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--amber-light); color: #0D1B2A;
  font-size: 10px; font-weight: 800; border-radius: 10px;
  padding: 1px 6px; margin-left: 5px; line-height: 1.4;
  font-family: 'Barlow Condensed', sans-serif;
}
.fb-item {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 14px 16px; position: relative;
  transition: border-color .15s;
}
.fb-item.unread {
  border-color: rgba(240,160,32,.35);
  background: rgba(240,160,32,.04);
}
.fb-item-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; gap: 10px; flex-wrap: wrap;
}
.fb-item-meta {
  display: flex; align-items: center; gap: 8px;
}
.fb-item-date {
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-dim);
  font-family: 'Barlow Condensed', sans-serif;
}
.fb-new-chip {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; padding: 2px 7px; border-radius: 4px;
  background: var(--amber-faint); color: var(--amber-light);
  border: 1px solid rgba(240,160,32,.3);
  font-family: 'Barlow Condensed', sans-serif;
}
.fb-item-body {
  font-size: 14px; color: var(--text-muted); line-height: 1.7;
  white-space: pre-wrap;
}
.fb-empty {
  text-align: center; padding: 3rem 2rem; color: var(--text-dim);
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; font-size: 14px; line-height: 1.6;
}
.fb-empty strong {
  display: block; font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px;
}
</style>
</head>
<body>
<div id="sidebarMount"></div>
<div class="main-content">
<div class="page" id="pageRoot">
  <div class="spinner"></div>
</div>
</div>
<div id="toast" class="toast"></div>

<!-- COPY IDP MODAL -->
<div class="share-overlay" id="copyOverlay" onclick="closeCopyModal(event)">
  <div class="share-modal" onclick="event.stopPropagation()" style="max-width:420px;">
    <div class="share-modal-title">⎘ Copy IDP</div>
    <div class="share-modal-sub">Duplicate this IDP as a new draft so you can adapt it for a different session or team.</div>
    <div style="margin:14px 0 4px;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.06em;">Source IDP</div>
    <div id="copySourceLabel" style="font-size:13px;color:var(--text-muted);background:var(--navy-mid);border-radius:6px;padding:8px 12px;margin-bottom:12px;"></div>
    <div class="share-actions" style="margin-top:12px;">
      <button class="share-done-btn" onclick="document.getElementById('copyOverlay').classList.remove('open');_copySourceIdx=null;">Cancel</button>
      <button class="btn btn-primary btn-sm" id="copyConfirmBtn" onclick="confirmCopyIDP()" style="padding:8px 18px;">Duplicate as New Draft</button>
    </div>
    <div style="font-size:12px;min-height:16px;margin-top:8px;color:var(--teal-light);" id="copyStatus"></div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="share-overlay" id="shareOverlay" onclick="closeShareModal(event)">
  <div class="share-modal" onclick="event.stopPropagation()">
    <div class="share-modal-title">🔗 Share IDP</div>
    <div class="share-modal-sub">Anyone with this link can view the plan — no login required.</div>
    <div class="share-url-row">
      <div class="share-url-box" id="shareUrlBox"></div>
      <button class="share-copy-btn" id="shareCopyBtn" onclick="copyShareUrl()">Copy</button>
    </div>
    <div class="share-actions">
      <a class="share-email-btn" id="shareEmailBtn" href="#" target="_blank">
        ✉ Open in email app
      </a>
      <button class="share-done-btn" onclick="closeShareModal()">Done</button>
    </div>
  </div>
</div>

<script>
const params   = new URLSearchParams(window.location.search);
const playerId = params.get('player');
const teamId   = params.get('team');

let allIDPs        = [];
let allNotes       = [];
let allFeedback    = [];
let playerData     = null;
let allPlayerTeams = [];   // all teams this player belongs to
let currentCoachId = null;

if (!playerId) window.location.href = '/dashboard.html';

(async () => {
  const ctx = await requireCoach();
  if (!ctx) return;
  currentCoachId = ctx.id;
  await renderSidebar('');

  const { data: player } = await sb.from('players').select('*').eq('id', playerId).single();
  const _appBase = window.location.pathname.replace(/\/[^/]+\.html.*$/, '');
  if (!player) { window.location.href = `${_appBase}/dashboard.html`; return; }
  playerData = player;

  const [idpRes, notesRes, linkedTeamsRes, feedbackRes] = await Promise.all([
    sb.from('idps').select('*').eq('player_id', playerId).order('updated_at', { ascending: false }),
    sb.from('player_notes').select('*').eq('player_id', playerId)
      .eq('coach_id', currentCoachId).order('created_at', { ascending: false }),
    sb.from('player_teams').select('teams(id,name,season,gotsport_group_id)').eq('player_id', playerId),
    sb.from('parent_feedback').select('*').eq('player_id', playerId).order('created_at', { ascending: false }),
  ]);
  allIDPs     = idpRes.data     || [];
  allNotes    = notesRes.data   || [];
  allFeedback = feedbackRes.data || [];

  // Build full team list: primary team + any linked teams (deduped)
  const teamMap = {};
  if (player.team_id) {
    const { data: primaryTeam } = await sb.from('teams').select('id,name,season,gotsport_group_id').eq('id', player.team_id).maybeSingle();
    if (primaryTeam) teamMap[primaryTeam.id] = primaryTeam;
  }
  (linkedTeamsRes.data || []).forEach(pt => {
    if (pt.teams) teamMap[pt.teams.id] = pt.teams;
  });
  allPlayerTeams = Object.values(teamMap);

  renderPage();
})();

function renderPage() {
  const _base = window.location.pathname.replace(/\/[^/]+\.html.*$/, '');
  const root = document.getElementById('pageRoot');
  const notesCount = allNotes.length;
  const idpCount   = allIDPs.length;

  const unreadCount   = allFeedback.filter(f => !f.is_read).length;
  const idpTabLabel   = idpCount   ? `IDPs (${idpCount})`   : 'IDPs';
  const notesTabLabel = notesCount ? `Coach Notes (${notesCount})` : 'Coach Notes';
  const feedbackBadge = unreadCount ? `<span class="feedback-unread-badge">${unreadCount}</span>` : '';

  const teamChips = allPlayerTeams.map(t =>
    `<a href="${_base}/team.html?team=${t.id}" class="player-team-chip">${esc(t.name)}${t.season ? ' <span style="opacity:.6;">(${esc(t.season)})</span>' : ''}</a>`
  ).join('');

  root.innerHTML = `
    <div class="breadcrumb">
      <a href="${_base}/dashboard.html">My Teams</a>
      <span>›</span>
      ${teamId ? `<a href="${_base}/team.html?team=${teamId}">Team</a><span>›</span>` : ''}
      <span>${esc(playerData.name)}</span>
    </div>

    <div class="player-header">
      <div style="display:flex;align-items:flex-start;gap:16px;">
        <div class="player-photo" onclick="document.getElementById('vpPhotoInput').click()" title="Upload photo">
          ${playerData.photo_url
            ? `<img src="${playerData.photo_url}" alt="${esc(playerData.name)}"><div class="player-photo-overlay">📷</div>`
            : `${(playerData.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}<div class="player-photo-overlay">📷</div>`}
        </div>
        <div>
          <div class="player-name">${esc(playerData.name)}</div>
          ${playerData.positions ? `<div class="player-pos">${esc(playerData.positions)}</div>` : ''}
          ${teamChips ? `<div class="player-team-chips" style="margin-top:8px;">${teamChips}</div>` : ''}
          ${playerData.notes ? `<div class="player-notes-preview">${esc(playerData.notes)}</div>` : ''}
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="window.print()">⬒ Print / PDF</button>
        <a href="${_base}/generate.html?player=${playerId}${teamId ? '&team='+teamId : ''}"
           class="btn btn-primary">✦ Generate New IDP</a>
      </div>
    </div>
    <input type="file" id="vpPhotoInput" accept="image/*" style="display:none" onchange="handleVpPhotoUpload(event)" />

    <div class="tab-nav">
      <button class="tab-btn active" id="tab-btn-idps"     onclick="showTab('idps')">${idpTabLabel}</button>
      <button class="tab-btn"        id="tab-btn-progress" onclick="showTab('progress')">Progress</button>
      <button class="tab-btn"        id="tab-btn-notes"    onclick="showTab('notes')">${notesTabLabel}</button>
      <button class="tab-btn"        id="tab-btn-season"   onclick="showTab('season')">Teams &amp; Season</button>
      <button class="tab-btn"        id="tab-btn-feedback" onclick="showTab('feedback')">Parent Feedback${feedbackBadge}</button>
    </div>

    <div id="panel-idps" class="tab-panel active">
      ${idpCount === 0 ? `
        <div class="empty">
          <div class="empty-icon">IDP</div>
          <p>No IDPs yet for this player.</p>
          <a href="${_base}/generate.html?player=${playerId}${teamId ? '&team='+teamId : ''}"
             class="btn btn-primary" style="margin-top:1rem;display:inline-flex;">
            ✦ Generate First IDP
          </a>
        </div>` : `
        <div class="idp-list-label">${idpCount} IDP${idpCount !== 1 ? 's' : ''} — select one to view</div>
        <div class="idp-list" id="idpList">
          ${allIDPs.map((idp, i) => `
            <div class="idp-list-item ${i === 0 ? 'selected' : ''}" id="item-${i}" onclick="selectIDP(${i})">
              <div class="item-icon ${idp.published ? 'published' : 'draft'}">
                ${idp.published ? '✓' : '✎'}
              </div>
              <div class="item-body">
                <div class="item-date">${formatDate(idp.updated_at)}</div>
                <div class="item-focus">${idp.data?.focus ? 'Focus: ' + esc(idp.data.focus) : 'Development Plan'}</div>
              </div>
              <div class="item-badges">
                <span class="status-chip ${idp.published ? 'published' : 'draft'}">
                  ${idp.published ? 'Published' : 'Draft'}
                </span>
              </div>
              <span class="item-arrow">▶</span>
            </div>`).join('')}
        </div>
        <div class="idp-viewer visible" id="idpViewer">
          ${renderViewer(allIDPs[0], 0)}
        </div>
      `}
    </div>

    <div id="panel-progress" class="tab-panel">
      ${renderProgressTab()}
    </div>

    <div id="panel-notes" class="tab-panel">
      ${renderNotesTab()}
    </div>

    <div id="panel-season" class="tab-panel">
      <div id="seasonContent" style="padding-top:1rem;"><div class="spinner"></div></div>
    </div>

    <div id="panel-feedback" class="tab-panel">
      ${renderFeedbackTab()}
    </div>
  `;
}

function showTab(tab) {
  ['idps','progress','notes','season','feedback'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'season' && !window._seasonLoaded) {
    window._seasonLoaded = true;
    loadSeasonData();
  }
  if (tab === 'feedback') {
    markFeedbackRead();
  }
}

function renderProgressTab() {
  if (allIDPs.length < 2) {
    return `<div class="progress-need-more">
      <strong>Not enough data yet</strong>
      Generate at least 2 IDPs to see how this player is progressing over time.
    </div>`;
  }

  // Show oldest → newest so the timeline reads upward in time
  const chrono = [...allIDPs].reverse();

  const entries = chrono.map((idp, i) => {
    const prev = i > 0 ? chrono[i - 1] : null;
    const currStrengths  = idp.data?.strengths   || [];
    const currImprovs    = idp.data?.improvements || [];
    const prevStrengths  = prev ? (prev.data?.strengths || []) : null;

    let deltaHtml = '';
    if (prevStrengths !== null) {
      const diff = currStrengths.length - prevStrengths.length;
      if (diff > 0)      deltaHtml = `<span class="pt-delta up">▲ +${diff} strength${diff > 1 ? 's' : ''}</span>`;
      else if (diff < 0) deltaHtml = `<span class="pt-delta down">▼ ${Math.abs(diff)} strength${Math.abs(diff) > 1 ? 's' : ''} fewer</span>`;
      else               deltaHtml = `<span class="pt-delta same">— same strengths</span>`;
    }

    const strengthTags = currStrengths.slice(0, 4).map(s =>
      `<span class="pt-tag strength">✦ ${esc(s.title)}</span>`).join('');
    const improvTags = currImprovs.slice(0, 4).map(s =>
      `<span class="pt-tag improvement">▲ ${esc(s.title)}</span>`).join('');

    const isLatest = i === chrono.length - 1;
    const origIdx  = allIDPs.indexOf(idp); // index in allIDPs (newest-first) for selectIDP()

    return `
      <div class="pt-entry">
        <div class="pt-dot ${isLatest ? 'latest' : ''}"></div>
        <div class="pt-card">
          <div class="pt-card-header">
            <div class="pt-date">${formatDate(idp.updated_at)}${isLatest ? ' <span style="font-size:11px;color:var(--teal-light);margin-left:6px;">Latest</span>' : ''}</div>
            <div class="pt-badges">
              ${idp.data?.focus ? `<span class="pt-focus">${esc(idp.data.focus)}</span>` : ''}
              ${deltaHtml}
            </div>
          </div>
          <div class="pt-tags">${strengthTags}${improvTags}</div>
          ${idp.data?.mantra ? `<div class="pt-mantra">"${esc(idp.data.mantra)}"</div>` : ''}

function formatNoteDate(iso) {

async function addNote() {
  const input = document.getElementById('noteInput');
  if (!input) return;
  const content = input.value.trim();
  if (!content) { input.focus(); return; }

  input.disabled = true;
  const { data, error } = await sb.from('player_notes').insert({
    player_id: playerId,
    coach_id: currentCoachId,
    content
  }).select().single();
  input.disabled = false;

  if (error) { showToast('Failed to save note'); return; }

  allNotes.unshift(data);
  input.value = '';

  const list = document.getElementById('notesList');
  if (list) {
    if (list.querySelector('.notes-empty')) list.innerHTML = '';
    list.insertAdjacentHTML('afterbegin', `
      <div class="note-item" id="note-${data.id}">
        <div class="note-header">
          <div class="note-date">${formatNoteDate(data.created_at)}</div>
          <button class="note-delete" onclick="deleteNote('${data.id}')" title="Delete note">×</button>
        </div>
        <div class="note-body">${esc(data.content)}</div>
      </div>
    `);
  }

  const tabBtn = document.getElementById('tab-btn-notes');
  if (tabBtn) tabBtn.textContent = `Coach Notes (${allNotes.length})`;
  showToast('Note saved ✓');
}

async function deleteNote(noteId) {
  if (!confirm('Delete this note? This cannot be undone.')) return;
  const { error } = await sb.from('player_notes').delete().eq('id', noteId);
  if (error) { showToast('Failed to delete note'); return; }

  allNotes = allNotes.filter(n => n.id !== noteId);
  const el = document.getElementById('note-' + noteId);
  if (el) el.remove();

  const list = document.getElementById('notesList');
  if (list && !list.querySelector('.note-item')) {
    list.innerHTML = '<div class="notes-empty">No notes yet. Add your first coaching observation above.</div>';
  }

  const tabBtn = document.getElementById('tab-btn-notes');
  if (tabBtn) tabBtn.textContent = allNotes.length ? `Coach Notes (${allNotes.length})` : 'Coach Notes';
  showToast('Note deleted');
}

function toggleDiff(idx) {
  const panel = document.getElementById('diffPanel-' + idx);
  const btn   = document.getElementById('compareBtn-' + idx);
  if (!panel) return;
  const showing = panel.style.display !== 'none';
  panel.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? '⇄ What Changed' : '⇄ Hide Changes';
}

function buildDiff(prev, curr) {
  const items = [];

  // Focus change
  if ((prev.focus || '') !== (curr.focus || '')) {
    items.push({ type: 'changed', label: 'Focus', text: esc(prev.focus || '—') + ' → <em>' + esc(curr.focus || '—') + '</em>' });
  }

  // Mantra change
  if ((prev.mantra || '') !== (curr.mantra || '')) {
    items.push({ type: 'changed', label: 'Mantra', text: esc(prev.mantra || '—') + ' → <em>' + esc(curr.mantra || '—') + '</em>' });
  }

  // Strengths — titles added or removed
  const prevStrengths = (prev.strengths || []).map(s => s.title);
  const currStrengths = (curr.strengths || []).map(s => s.title);
  currStrengths.filter(t => !prevStrengths.includes(t)).forEach(t => {
    items.push({ type: 'added', label: 'New strength', text: '<em>' + esc(t) + '</em>' });
  });
  prevStrengths.filter(t => !currStrengths.includes(t)).forEach(t => {
    items.push({ type: 'removed', label: 'Strength removed', text: esc(t) });
  });

  // Improvements — titles added, resolved, or carried over
  const prevImprov = (prev.improvements || []).map(s => s.title);
  const currImprov = (curr.improvements || []).map(s => s.title);
  prevImprov.filter(t => !currImprov.includes(t)).forEach(t => {
    items.push({ type: 'added', label: 'Resolved', text: '<em>' + esc(t) + '</em>' });
  });
  currImprov.filter(t => !prevImprov.includes(t)).forEach(t => {
    items.push({ type: 'removed', label: 'New focus area', text: '<em>' + esc(t) + '</em>' });
  });

  // Duration change
  if ((prev.duration || '') !== (curr.duration || '')) {
    items.push({ type: 'changed', label: 'Duration', text: esc(prev.duration || '—') + ' → <em>' + esc(curr.duration || '—') + '</em>' });
  }

  if (items.length === 0) {
    return '<div class="diff-panel-header"><div class="diff-panel-title">What Changed</div><button class="diff-close" onclick="toggleDiff(0)">×</button></div>' +
      '<div style="font-size:13px;color:var(--text-dim);">No structural changes detected between these two IDPs.</div>';
  }

  const prevDate = formatDate(allIDPs.find(i => i.data === prev)?.updated_at || '');
  const header = '<div class="diff-panel-header">' +
    '<div class="diff-panel-title">What Changed <span style="font-weight:400;text-transform:none;letter-spacing:0;font-family:\'Inter\',sans-serif;font-size:11px;margin-left:6px;">vs ' + esc(prevDate) + '</span></div>' +
    '</div>';

  const rows = items.map(item =>
    '<div class="diff-item ' + item.type + '">' +
      '<span class="diff-tag ' + item.type + '">' + esc(item.label) + '</span>' +
      '<span class="diff-text">' + item.text + '</span>' +
    '</div>'
  ).join('');

  return header + '<div class="diff-row">' + rows + '</div>';
}

async function publishIDP(idpId, idx) {
  const { error } = await sb.from('idps').update({ published: true, updated_at: new Date().toISOString() }).eq('id', idpId);
  if (!error) {

}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

let _shareUrl = '';

async function shareIDP(idpId, idx) {
  let token = allIDPs[idx].share_token;
  if (!token) {
    token = generateUUID();
    const { error } = await sb.from('idps').update({ share_token: token }).eq('id', idpId);
    if (error) { showToast('Failed to create link'); return; }
    allIDPs[idx].share_token = token;
  }
  const basePath = window.location.pathname.replace(/\/[^/]+\.html.*$/, '');
  _shareUrl = `${window.location.origin}${basePath}/player-view.html?token=${token}`;

  const playerName = playerData?.name || 'your player';
  const subject = encodeURIComponent(`IDP for ${playerName}`);
  const body = encodeURIComponent(
    `Hi,\n\nHere is the Individual Development Plan for ${playerName}.\n\nView it here: ${_shareUrl}\n\nNo login required — just open the link.\n\nThanks`
  );

  document.getElementById('shareUrlBox').textContent = _shareUrl;
  document.getElementById('shareEmailBtn').href = `mailto:?subject=${subject}&body=${body}`;
  document.getElementById('shareCopyBtn').textContent = 'Copy';
  document.getElementById('shareCopyBtn').classList.remove('copied');
  document.getElementById('shareOverlay').classList.add('open');
}

async function copyShareUrl() {
  const btn = document.getElementById('shareCopyBtn');
  try {
    await navigator.clipboard.writeText(_shareUrl);
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  } catch {
    prompt('Copy this link:', _shareUrl);
  }
}

function closeShareModal(e) {
  if (e && e.target !== document.getElementById('shareOverlay')) return;
  document.getElementById('shareOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('shareOverlay')?.classList.remove('open');
});

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function timeAgo(iso) {
  var diff = Date.now() - new Date(iso).getTime();
  var days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7)  return days + 'd ago';
  if (days < 30) return Math.floor(days / 7) + 'w ago';
  if (days < 365) return Math.floor(days / 30) + 'mo ago';
  return Math.floor(days / 365) + 'yr ago';
}

// ─── PLAYER PHOTO UPLOAD ───────────────────────────────────────────────
async function handleVpPhotoUpload(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('Image must be under 2MB'); return; }

  showToast('Uploading…');
  const ext  = file.name.split('.').pop().toLowerCase() || 'jpg';
  const path = `${playerId}/photo.${ext}`;

  const { error: upErr } = await sb.storage
    .from('player-photos')
    .upload(path, file, { upsert: true, contentType: file.type });

  if (upErr) { showToast('Upload failed: ' + upErr.message); return; }

  const { data: urlData } = sb.storage.from('player-photos').getPublicUrl(path);
  const photoUrl = urlData.publicUrl + '?t=' + Date.now();

  await sb.from('players').update({ photo_url: photoUrl }).eq('id', playerId);
  playerData.photo_url = photoUrl;

  const photoEl = document.querySelector('.player-photo');
  if (photoEl) {
    photoEl.innerHTML = `<img src="${photoUrl}" alt="${esc(playerData.name)}"><div class="player-photo-overlay">📷</div>`;
  }
  showToast('Photo updated ✓');
}

          '<div class="stat-pill wins"><div class="sp-val">' + (standing.w || 0) + '</div><div class="sp-lbl">W</div></div>' +
          '<div class="stat-pill losses"><div class="sp-val">' + (standing.l || 0) + '</div><div class="sp-lbl">L</div></div>' +
          '<div class="stat-pill draws"><div class="sp-val">' + (standing.d || 0) + '</div><div class="sp-lbl">D</div></div>' +
          '<div class="stat-pill pts"><div class="sp-val">' + (standing.pts || 0) + '</div><div class="sp-lbl">PTS</div></div>' +
          '<div class="stat-pill" style="margin-left:4px;">' +
            '<div class="sp-val" style="color:var(--text-dim)">' + (standing.gf || 0) + '-' + (standing.ga || 0) + '</div>' +
            '<div class="sp-lbl">GF-GA</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    if (results.length > 0) {
      // Filter out rows where opponent looks like a score value (data artifact)
      var validResults = results.filter(function(r) {
        return r.opponent && !/^\d+-\d+$/.test(r.opponent.trim());
      });

      // Deduplicate: same (opponent, gf, ga, result) → keep one, preferring the row with a date
      var dedupMap = {};
      validResults.forEach(function(r) {
        var key = (r.opponent || '').toLowerCase() + '|' + r.goals_for + '|' + r.goals_against + '|' + r.result;
        if (!dedupMap[key] || (!dedupMap[key].match_date && r.match_date)) {
          dedupMap[key] = r;
        }
      });
      var dedupedResults = Object.values(dedupMap);

      // Sort: rows with dates first (by date asc), then undated rows by opponent name
      dedupedResults.sort(function(a, b) {
        if (a.match_date && b.match_date) return a.match_date.localeCompare(b.match_date);
        if (a.match_date) return -1;
        if (b.match_date) return  1;
        return (a.opponent || '').localeCompare(b.opponent || '');
      });

      // Check if any result actually has a date
      var hasDates = dedupedResults.some(function(r) { return !!r.match_date; });

      var rowsHtml = dedupedResults.map(function(r) {
        var score  = (r.goals_for != null && r.goals_against != null) ? r.goals_for + '-' + r.goals_against : '—';
        var badge  = r.result || 'U';

        // Date column: only shown when at least one row has a date
        var dateHtml = '';
        if (hasDates) {
          var dateStr = '—';
          if (r.match_date) {
            var d = new Date(r.match_date + 'T12:00:00');
            dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          }
          dateHtml = '<div class="result-date">' + dateStr + '</div>';
        }

        // Home/Away badge
        var haHtml = '';
        if (r.is_home === true) {
          haHtml = '<span class="result-ha home">Home</span>';
        } else if (r.is_home === false) {
          haHtml = '<span class="result-ha away">Away</span>';
        } else {
          haHtml = '<span class="result-ha" style="visibility:hidden;">—</span>';
        }

        var gridCols = hasDates ? '80px 1fr auto auto auto' : '1fr auto auto auto';
        return '<div class="result-row" style="grid-template-columns:' + gridCols + '">' +
          dateHtml +
          '<div class="result-opp">' + esc(r.opponent || '—') + '</div>' +
          haHtml +
          '<div class="result-score">' + score + '</div>' +
          '<div class="result-badge ' + badge + '">' + (badge === 'U' ? '?' : badge) + '</div>' +
        '</div>';
      }).join('');

      var bodyId = 'matchResultsList_' + groupId;
      var chevId = 'matchChevron_' + groupId;
      html +=
        '<div class="results-header" onclick="toggleMatchResultsView(this,' + JSON.stringify(bodyId) + ',' + JSON.stringify(chevId) + ')">' +
          '<span class="results-label">Match Results (' + dedupedResults.length + ')</span>' +
          '<span class="results-chevron" id="' + chevId + '">▼</span>' +
        '</div>' +
        '<div class="results-body" id="' + bodyId + '">' +
          '<div class="results-list">' + rowsHtml + '</div>' +
        '</div>';
    } else if (!standing) {
      html += '<div style="font-size:13px;color:var(--text-dim);background:var(--navy-mid);border-radius:8px;padding:10px 14px;">No league data yet. Run the sync to pull data from GotSport.</div>';
    }

    html += '</div>';

    // Divider between teams
    if (i < allPlayerTeams.length - 1) {
      html += '<hr style="border:none;border-top:1px solid var(--border);margin:0 0 1.5rem;">';
    }
  }

  container.innerHTML = html;
}

function toggleMatchResultsView(header, bodyId, chevId) {
  var body   = document.getElementById(bodyId);
  var chevron = document.getElementById(chevId);
  if (!body) return;
  var hidden = body.classList.toggle('results-hidden');
  if (chevron) chevron.classList.toggle('collapsed', hidden);
}

// ─── COPY IDP ──────────────────────────────────────────────────────────────
var _copySourceIdx = null;

function openCopyIDP(idx) {
  _copySourceIdx = idx;
  var idp  = allIDPs[idx];
  var date = formatDate(idp.updated_at);
  var focus = idp.data?.focus || 'Development Plan';
  document.getElementById('copySourceLabel').textContent = date + ' — ' + focus;
  document.getElementById('copyStatus').textContent = '';
  document.getElementById('copyConfirmBtn').disabled = false;
  document.getElementById('copyConfirmBtn').textContent = 'Duplicate as New Draft';
  document.getElementById('copyOverlay').classList.add('open');
}

function closeCopyModal(e) {
  if (e && e.target !== document.getElementById('copyOverlay')) return;
  document.getElementById('copyOverlay').classList.remove('open');
  _copySourceIdx = null;
}

async function confirmCopyIDP() {
  if (_copySourceIdx === null) return;
  var idp = allIDPs[_copySourceIdx];
  var btn = document.getElementById('copyConfirmBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

  var { error, data } = await sb.from('idps').insert({
    player_id:  idp.player_id,
    created_by: currentCoachId,
    data:       JSON.parse(JSON.stringify(idp.data || {})),
    published:  false,
    updated_at: new Date().toISOString(),
  }).select().single();

  if (error) {
    document.getElementById('copyStatus').textContent = 'Error: ' + error.message;
    btn.disabled = false; btn.textContent = 'Duplicate as New Draft';
    return;
  }

  // Prepend new IDP and refresh view
  allIDPs.unshift(data);
  document.getElementById('copyStatus').textContent = 'Copied! Opening new draft…';
  setTimeout(function() {
    document.getElementById('copyOverlay').classList.remove('open');
    // Rebuild the IDP list and select the new one
    var listEl = document.getElementById('idpList');
    if (listEl) {
      listEl.insertAdjacentHTML('afterbegin',
        `<div class="idp-list-item selected" id="item-0" onclick="selectIDP(0)">
          <div class="item-icon draft">✎</div>
          <div class="item-body">
            <div class="item-date">${formatDate(data.updated_at)}</div>
            <div class="item-focus">Focus: ${esc(data.data?.focus || 'Development Plan')} <span style="font-size:11px;color:var(--amber-light);">(copy)</span></div>
          </div>
          <div class="item-badges"><span class="status-chip draft">Draft</span></div>
          <span class="item-arrow">▶</span>
        </div>`
      );
      // Deselect all others and bump their indices
      listEl.querySelectorAll('.idp-list-item').forEach(function(el, i) {
        if (i > 0) {
          el.id = 'item-' + i;
          el.setAttribute('onclick', 'selectIDP(' + i + ')');
          el.classList.remove('selected');
        }
      });
    }
    selectIDP(0);
    showToast('IDP duplicated as new draft');
  }, 800);
}
</script>
