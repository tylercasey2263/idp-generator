<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View IDP — Player IDP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-mid: #1A2E44; --navy-light: #243B55;
  --teal: #1B8A6B; --teal-light: #22A882; --teal-faint: #0D2E25;
  --amber: #D4870A; --amber-light: #F0A020; --amber-faint: #2E1E05;
  --text: #EDF2F7; --text-muted: #94A3B8; --text-dim: #64748B;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --red-light: #E05050;
}
html, body { min-height: 100vh; background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; }

.page { max-width: 860px; margin: 0 auto; padding: 2rem 2rem 4rem; }

/* Breadcrumb */
.breadcrumb { font-size: 13px; color: var(--text-dim); margin-bottom: 1.5rem; }
.breadcrumb a { color: var(--teal-light); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { margin: 0 6px; }

/* Player header */
.player-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;
}
.player-name-group { display: flex; flex-direction: column; gap: 3px; }
.player-name { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; }
.player-pos  { font-size: 13px; color: var(--text-dim); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 8px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: background .15s; text-decoration: none; white-space: nowrap;
}
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: var(--teal-light); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
.btn-ghost:hover { color: var(--text-muted); }

/* IDP History tabs */
.idp-history {
  display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap;
  border-bottom: 1px solid var(--border-strong); padding-bottom: 1rem;
}
.idp-tab {
  display: flex; flex-direction: column; gap: 3px;
  padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border-strong);
  background: var(--navy-mid); cursor: pointer; transition: border-color .15s;
  min-width: 110px;
}
.idp-tab:hover { border-color: rgba(34,168,130,.4); }
.idp-tab.active { border-color: var(--teal); background: var(--teal-faint); }
.tab-date { font-size: 12px; font-weight: 600; color: var(--text); }
.tab-status { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; font-weight: 700; }
.tab-status.published { color: var(--teal-light); }
.tab-status.draft     { color: var(--amber-light); }

/* Action bar */
.action-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px;
}
.action-bar-left { display: flex; align-items: center; gap: 10px; }
.status-pill {
  display: inline-flex; align-items: center; gap: 5px; font-size: 11px;
  font-weight: 700; padding: 4px 10px; border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: .06em; text-transform: uppercase;
}
.status-pill.published { background: var(--teal-faint); color: var(--teal-light); border: 1px solid rgba(27,138,107,.3); }
.status-pill.draft     { background: var(--amber-faint); color: var(--amber-light); border: 1px solid rgba(212,135,10,.25); }
.updated-at { font-size: 12px; color: var(--text-dim); }

/* IDP infographic (mirrors parent.html) */
#idpDisplay {
  font-family: 'Inter', sans-serif; font-size: 15px;
  color: #EDF2F7; background: var(--navy-mid); border-radius: 10px; padding: 2rem;
  border: 1px solid var(--border-strong);
}
#idpDisplay .ig-header { display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 1rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(255,255,255,.15); margin-bottom: 1.5rem; }
#idpDisplay .ig-header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 800; line-height: 1; }
#idpDisplay .ig-header h1 span { color: #22A882; }
#idpDisplay .ig-header .sub { font-size: 12px; color: #64748B; margin-top: 5px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
#idpDisplay .ig-header .pos-badge { display: inline-block; background: #0D2E25; border: 1px solid #1B8A6B; color: #22A882; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 5px 12px; border-radius: 4px; }
#idpDisplay .ig-header .phase { display: block; font-size: 11px; color: #64748B; font-family: 'Barlow Condensed', sans-serif; letter-spacing: .08em; text-transform: uppercase; margin-top: 6px; text-align: right; }
#idpDisplay .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1.5rem; }
#idpDisplay .stat-card { background: #1A2E44; border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 12px 14px; }
#idpDisplay .stat-card .val { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; line-height: 1.2; }
#idpDisplay .stat-card .lbl { font-size: 10px; color: #64748B; text-transform: uppercase; letter-spacing: .08em; margin-top: 3px; font-family: 'Barlow Condensed', sans-serif; }
#idpDisplay .sec-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #64748B; margin-bottom: 8px; margin-top: 1.5rem; }
#idpDisplay .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
#idpDisplay .card { border-radius: 8px; padding: 12px 14px; border: 1px solid rgba(255,255,255,.08); }
#idpDisplay .card.green { background: #0D2214; border-color: rgba(56,160,80,.2); }
#idpDisplay .card.amber { background: #2E1E05; border-color: rgba(212,135,10,.2); }
#idpDisplay .card h4 { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
#idpDisplay .card .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
#idpDisplay .card p { font-size: 12px; color: #94A3B8; line-height: 1.5; }
#idpDisplay .divider { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 1.5rem 0 0; }
#idpDisplay .plan-list { display: flex; flex-direction: column; gap: 6px; }
#idpDisplay .plan-item { display: grid; grid-template-columns: 100px 1fr; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
#idpDisplay .plan-badge { display: flex; align-items: center; justify-content: center; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 10px 7px; line-height: 1.3; }
#idpDisplay .plan-badge.purple { background: #1A1230; color: #7357C8; border-right: 1px solid rgba(115,87,200,.2); }
#idpDisplay .plan-badge.amber  { background: #2E1E05; color: #F0A020; border-right: 1px solid rgba(212,135,10,.2); }
#idpDisplay .plan-badge.teal   { background: #0D2E25; color: #22A882; border-right: 1px solid rgba(27,138,107,.2); }
#idpDisplay .plan-badge.blue   { background: #0D1E2E; color: #60A5FA; border-right: 1px solid rgba(96,165,250,.2); }
#idpDisplay .plan-content { background: #1A2E44; padding: 10px 14px; }
#idpDisplay .plan-content h4 { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
#idpDisplay .plan-content ul { list-style: none; display: flex; flex-direction: column; gap: 3px; }
#idpDisplay .plan-content ul li { font-size: 12px; color: #94A3B8; display: flex; gap: 7px; align-items: flex-start; line-height: 1.45; }
#idpDisplay .plan-content ul li::before { content: '—'; color: #64748B; flex-shrink: 0; }
#idpDisplay .micro-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #60A5FA; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; margin-top: 1.5rem; }
#idpDisplay .micro-label::after { content: ''; flex: 1; height: 1px; background: rgba(96,165,250,.2); }
#idpDisplay .micro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
#idpDisplay .micro-card { background: #0D1E2E; border: 1px solid rgba(96,165,250,.2); border-radius: 8px; padding: 12px 14px; text-align: center; }
#idpDisplay .micro-card .num { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: #60A5FA; line-height: 1; }
#idpDisplay .micro-card .desc { font-size: 11px; color: #94A3B8; margin-top: 4px; line-height: 1.4; }
#idpDisplay .gameday { background: #1A2E44; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-top: 8px; }
#idpDisplay .gameday .gd-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #64748B; white-space: nowrap; }
#idpDisplay .gameday .gd-text { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; }
#idpDisplay .gameday .gd-text span { color: #22A882; }
#idpDisplay .goal-banner { background: #0D2E25; border: 1px solid rgba(27,138,107,.35); border-radius: 10px; padding: 16px 18px; margin-top: 8px; display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: center; }
#idpDisplay .goal-banner .timeline { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: #22A882; text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; }
#idpDisplay .goal-banner p { font-size: 13px; color: #94A3B8; line-height: 1.55; }
#idpDisplay .parent-note { margin-top: 1.5rem; border-left: 3px solid rgba(255,255,255,.15); padding: 10px 16px; background: #1A2E44; border-radius: 0 8px 8px 0; }
#idpDisplay .parent-note .plabel { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #64748B; margin-bottom: 6px; }
#idpDisplay .parent-note p { font-size: 12px; color: #94A3B8; line-height: 1.6; font-style: italic; }

.empty { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
.empty-icon { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; opacity: .2; margin-bottom: 1rem; }
.spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border-strong); border-top-color: var(--teal-light); border-radius: 50%; animation: spin .7s linear infinite; margin: 4rem auto; display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .main-content { margin-left: 0 !important; }
  .idp-sidebar, .sb-topbar, .breadcrumb, .player-header, .idp-history, .action-bar { display: none !important; }
  body { background: #0D1B2A; }
}
@media (max-width: 600px) {
  #idpDisplay .stats-row { grid-template-columns: 1fr 1fr; }
  #idpDisplay .card-grid  { grid-template-columns: 1fr; }
  #idpDisplay .micro-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="sidebarMount"></div>
<div class="main-content">
<div class="page" id="pageRoot">
  <div class="spinner"></div>
</div>
</div>

<script>
const params   = new URLSearchParams(window.location.search);
const playerId = params.get('player');
const teamId   = params.get('team');

let allIDPs    = [];
let activeIDP  = null;
let userRole   = 'coach';

if (!playerId) window.location.href = '/dashboard.html';

(async () => {
  const ctx = await requireCoach();
  if (!ctx) return;
  userRole = ctx.profile.role;
  await renderSidebar('');

  // Load player info
  const { data: player } = await sb.from('players').select('*').eq('id', playerId).single();
  if (!player) { window.location.href = '/dashboard.html'; return; }

  // Load all IDPs for this player, newest first
  const { data: idps } = await sb
    .from('idps')
    .select('*')
    .eq('player_id', playerId)
    .order('updated_at', { ascending: false });

  allIDPs = idps || [];
  renderPage(player);
})();

function renderPage(player) {
  const root = document.getElementById('pageRoot');
  const backHref = teamId ? `/team.html?team=${teamId}` : '/players.html';
  const backLabel = teamId ? '← Team' : '← All Players';

  root.innerHTML = `
    <div class="breadcrumb">
      <a href="/dashboard.html">My Teams</a>
      <span>›</span>
      ${teamId ? `<a href="/team.html?team=${teamId}">Team</a><span>›</span>` : ''}
      <span>${esc(player.name)}</span>
    </div>

    <div class="player-header">
      <div class="player-name-group">
        <div class="player-name">${esc(player.name)}</div>
        ${player.positions ? `<div class="player-pos">${esc(player.positions)}</div>` : ''}
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="window.print()">⬒ Print / PDF</button>
        <a href="/generate.html?player=${playerId}${teamId ? '&team='+teamId : ''}" class="btn btn-primary">✦ Generate New IDP</a>
      </div>
    </div>

    ${allIDPs.length > 1 ? `
      <div class="idp-history" id="idpHistory">
        ${allIDPs.map((idp, i) => `
          <div class="idp-tab ${i === 0 ? 'active' : ''}" onclick="selectIDP(${i})" id="tab-${i}">
            <div class="tab-date">${formatDate(idp.updated_at)}</div>
            <div class="tab-status ${idp.published ? 'published' : 'draft'}">${idp.published ? '✓ Published' : 'Draft'}</div>
          </div>`).join('')}
      </div>` : ''}

    <div id="idpArea">
      ${allIDPs.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">IDP</div>
          <p>No IDPs yet for this player.</p>
          <a href="/generate.html?player=${playerId}${teamId ? '&team='+teamId : ''}" class="btn btn-primary" style="margin-top:1rem;display:inline-flex;">✦ Generate First IDP</a>
        </div>` : renderIDPPanel(allIDPs[0], 0)}
    </div>
  `;
}

function renderIDPPanel(idp, idx) {
  const date = formatDate(idp.updated_at);
  return `
    <div class="action-bar">
      <div class="action-bar-left">
        <span class="status-pill ${idp.published ? 'published' : 'draft'}">${idp.published ? '✓ Published' : 'Draft'}</span>
        <span class="updated-at">Last updated ${date}</span>
      </div>
      <div style="display:flex;gap:8px;">
        <a href="/generate.html?idp=${idp.id}&player=${idp.player_id}${teamId ? '&team='+teamId : ''}" class="btn btn-ghost">✎ Edit</a>
        ${!idp.published ? `<button class="btn btn-primary" onclick="publishIDP('${idp.id}')">⬆ Publish</button>` : ''}
      </div>
    </div>
    <div id="idpDisplay">${buildInfographicHTML(idp.data)}</div>
  `;
}

function selectIDP(idx) {
  document.querySelectorAll('.idp-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.getElementById('idpArea').innerHTML = renderIDPPanel(allIDPs[idx], idx);
}

async function publishIDP(idpId) {
  const { error } = await sb.from('idps').update({ published: true }).eq('id', idpId);
  if (!error) {
    const i = allIDPs.findIndex(x => x.id === idpId);
    if (i >= 0) allIDPs[i].published = true;
    selectIDP(allIDPs.findIndex(x => x.id === idpId));
    // Refresh tabs
    document.querySelectorAll('.idp-tab').forEach((t, idx) => {
      const statusEl = t.querySelector('.tab-status');
      if (statusEl && allIDPs[idx]?.id === idpId) {
        statusEl.textContent = '✓ Published';
        statusEl.className = 'tab-status published';
      }
    });
  }
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function buildInfographicHTML(d) {
  if (!d) return '<p style="color:var(--text-dim);padding:2rem;text-align:center;">IDP data not available.</p>';
  const sc = (d.strengths||[]).map(s => `<div class="card green"><h4><span class="dot" style="background:#38A050;"></span>${esc(s.title)}</h4><p>${esc(s.body)}</p></div>`).join('');
  const ic = (d.improvements||[]).map(s => `<div class="card amber"><h4><span class="dot" style="background:#F0A020;"></span>${esc(s.title)}</h4><p>${esc(s.body)}</p></div>`).join('');
  const pr = (d.plan||[]).map(p => `<div class="plan-item"><div class="plan-badge ${p.badgeType||'purple'}">${esc(p.badge)}</div><div class="plan-content"><h4>${esc(p.title)}</h4><ul>${(p.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div></div>`).join('');
  const mc = (d.microHabits||[]).map(m => `<div class="micro-card"><div class="num">${esc(m.num)}</div><div class="desc">${esc(m.desc)}</div></div>`).join('');
  const gdParts = (d.gameDayFocus||'').split('—');
  const gdText  = gdParts.length > 1 ? `<span>${esc(gdParts[0].trim())}</span> — ${esc(gdParts[1].trim())}` : esc(d.gameDayFocus||'');
  return `
    <div class="ig-header">
      <div><h1>${esc(d.playerName||'Player')} <span>IDP</span></h1><div class="sub">Individual Development Plan · Coaching Staff</div></div>
      <div style="text-align:right;"><div class="pos-badge">${esc(d.position||'Field Player')}</div><span class="phase">Phase: ${esc(d.focus||'Development')}</span></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="val">Development</div><div class="lbl">Current phase</div></div>
      <div class="stat-card"><div class="val">${esc(d.focus||'—')}</div><div class="lbl">Focus</div></div>
      <div class="stat-card"><div class="val">${esc(d.duration||'12 months')}</div><div class="lbl">Plan duration</div></div>
      <div class="stat-card"><div class="val">${esc(d.mantra||'Play with intent')}</div><div class="lbl">Mantra</div></div>
    </div>
    <div class="sec-label">Keep doing — strengths to build on</div>
    <div class="card-grid">${sc}</div>
    <hr class="divider">
    <div class="sec-label">Areas to improve</div>
    <div class="card-grid">${ic}</div>
    <hr class="divider">
    <div class="sec-label">Development plan</div>
    <div class="plan-list">${pr}</div>
    <div class="micro-label">Home micro-habits — daily</div>
    <div class="micro-grid">${mc}</div>
    <div class="gameday"><div class="gd-label">Game day focus</div><div class="gd-text">${gdText}</div></div>
    <div class="sec-label" style="margin-top:1.5rem;">12-month goal</div>
    <div class="goal-banner"><div class="timeline">12-month<br>vision</div><p>${esc(d.goalVision||'')}</p></div>
    <div class="parent-note"><div class="plabel">Note for parents</div><p>${esc(d.parentNote||'')}</p></div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
