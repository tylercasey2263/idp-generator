<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Portal — Player IDP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-mid: #1A2E44; --navy-light: #243B55;
  --teal: #1B8A6B; --teal-light: #22A882; --teal-faint: #0D2E25;
  --amber-light: #F0A020; --amber-faint: #2E1E05;
  --green-light: #38A050; --green-faint: #0D2214;
  --purple-light: #7357C8; --purple-faint: #1A1230;
  --text: #EDF2F7; --text-muted: #A8B8CC; --text-dim: #64748B;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --red-light: #E05050;
}
html, body { min-height: 100vh; background: var(--navy); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; }

/* ─── NAV ─── */
.topnav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 56px; border-bottom: 1px solid var(--border);
  background: var(--navy); position: sticky; top: 0; z-index: 100;
}
.nav-brand { font-family: 'Barlow Condensed', sans-serif; font-size: 20px;
  font-weight: 800; color: var(--text); }
.nav-brand span { color: var(--teal-light); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-name { font-size: 13px; color: var(--text-muted); }
.nav-btn {
  font-size: 12px; font-weight: 600; color: var(--text-dim);
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 11px; cursor: pointer; font-family: 'Inter', sans-serif;
  transition: color 0.2s, border-color 0.2s;
}
.nav-btn:hover { color: var(--text-muted); border-color: var(--border-strong); }

/* ─── PAGE ─── */
.page { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem; }

.page-header { margin-bottom: 2rem; }
.page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; }
.page-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

/* ─── STATUS MESSAGES ─── */
.info-card {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 12px; padding: 2rem; text-align: center;
}
.info-card .icon { font-size: 36px; margin-bottom: 1rem; opacity: 0.6; }
.info-card h2 { font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.info-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 380px; margin: 0 auto; }

.spinner-wrap { display: flex; align-items: center; justify-content: center;
  padding: 4rem; }
.spinner-lg { width: 32px; height: 32px; border: 3px solid var(--border-strong);
  border-top-color: var(--teal-light); border-radius: 50%;
  animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── IDP CARD ─── */
.idp-section { margin-bottom: 2.5rem; }
.idp-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; flex-wrap: wrap; gap: 8px;
}
.idp-date { font-size: 12px; color: var(--text-dim); }
.idp-badge {
  display: inline-flex; align-items: center; gap: 5px; font-size: 11px;
  font-weight: 700; padding: 4px 10px; border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; text-transform: uppercase;
  background: var(--teal-faint); color: var(--teal-light);
  border: 1px solid rgba(27,138,107,0.3);
}
.btn-print {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border-strong);
  background: var(--navy-mid); color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: color 0.2s;
}
.btn-print:hover { color: var(--text); }

/* ─── INFOGRAPHIC — improved readability ─── */
.idp-ig {
  font-family: 'Inter', sans-serif; font-size: 15px;
  color: #EDF2F7; background: #1A2E44; border-radius: 12px; padding: 2.25rem;
  border: 1px solid rgba(255,255,255,0.15);
}
.idp-ig .ig-header { display: grid; grid-template-columns: 1fr auto;
  align-items: end; gap: 1rem; padding-bottom: 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.10); margin-bottom: 1.75rem; }
.idp-ig .ig-header h1 { font-family: 'Barlow Condensed', sans-serif;
  font-size: 48px; font-weight: 800; line-height: 1; color: #EDF2F7; }
.idp-ig .ig-header h1 span { color: #22A882; }
.idp-ig .ig-header .sub { font-size: 13px; color: #64748B; margin-top: 6px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; }
.idp-ig .ig-header .pos-badge { display: inline-block; background: #0D2E25;
  border: 1px solid #1B8A6B; color: #22A882; font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 5px; }
.idp-ig .ig-header .phase { display: block; font-size: 12px; color: #64748B;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.08em;
  text-transform: uppercase; margin-top: 7px; text-align: right; }
.idp-ig .stats-row { display: grid; grid-template-columns: repeat(4,1fr);
  gap: 10px; margin-bottom: 1.75rem; }
.idp-ig .stat-card { background: #243B55; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 14px 16px; }
.idp-ig .stat-card .val { font-family: 'Barlow Condensed', sans-serif;
  font-size: 19px; font-weight: 700; color: #EDF2F7; line-height: 1.2; }
.idp-ig .stat-card .lbl { font-size: 11px; color: #64748B;
  text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600; }
.idp-ig .sec-label { font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: #64748B; margin-bottom: 10px; margin-top: 1.75rem; }
.idp-ig .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.idp-ig .card { border-radius: 10px; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.07); }
.idp-ig .card.green { background: #0D2214; border-color: rgba(56,160,80,0.25); }
.idp-ig .card.amber { background: #2E1E05; border-color: rgba(212,135,10,0.25); }
.idp-ig .card h4 { font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
  font-weight: 700; color: #EDF2F7; margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }
.idp-ig .card .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.idp-ig .card p { font-size: 13px; color: #A8B8CC; line-height: 1.6; }
.idp-ig .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 1.75rem 0 0; }
.idp-ig .plan-list { display: flex; flex-direction: column; gap: 8px; }
.idp-ig .plan-item { display: grid; grid-template-columns: 110px 1fr;
  border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); }
.idp-ig .plan-badge { display: flex; align-items: center; justify-content: center;
  text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 12px 8px; line-height: 1.4; }
.idp-ig .plan-badge.purple { background: #1A1230; color: #7357C8; border-right: 1px solid rgba(115,87,200,0.2); }
.idp-ig .plan-badge.amber  { background: #2E1E05; color: #F0A020; border-right: 1px solid rgba(212,135,10,0.2); }
.idp-ig .plan-badge.teal   { background: #0D2E25; color: #22A882; border-right: 1px solid rgba(27,138,107,0.2); }
.idp-ig .plan-badge.blue   { background: #0D1E2E; color: #60A5FA; border-right: 1px solid rgba(96,165,250,0.2); }
.idp-ig .plan-content { background: #243B55; padding: 12px 16px; }
.idp-ig .plan-content h4 { font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700; color: #EDF2F7; margin-bottom: 6px; }
.idp-ig .plan-content ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.idp-ig .plan-content ul li { font-size: 13px; color: #A8B8CC;
  display: flex; gap: 8px; align-items: flex-start; line-height: 1.55; }
.idp-ig .plan-content ul li::before { content: '—'; color: #64748B; flex-shrink: 0; }
.idp-ig .micro-label { font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #60A5FA; display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; margin-top: 1.75rem; }
.idp-ig .micro-label::after { content: ''; flex: 1; height: 1px; background: rgba(96,165,250,0.2); }
.idp-ig .micro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.idp-ig .micro-card { background: #0D1E2E; border: 1px solid rgba(96,165,250,0.2);
  border-radius: 10px; padding: 14px; text-align: center; }
.idp-ig .micro-card .num { font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px; font-weight: 800; color: #60A5FA; line-height: 1; }
.idp-ig .micro-card .desc { font-size: 12px; color: #A8B8CC; margin-top: 5px; line-height: 1.5; }
.idp-ig .gameday { background: #243B55; border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; margin-top: 10px; }
.idp-ig .gameday .gd-label { font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #64748B; white-space: nowrap; }
.idp-ig .gameday .gd-text { font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 700; color: #EDF2F7; }
.idp-ig .gameday .gd-text span { color: #22A882; }
.idp-ig .goal-banner { background: #0D2E25; border: 1px solid rgba(27,138,107,0.35);
  border-radius: 10px; padding: 18px 20px; margin-top: 10px;
  display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: center; }
.idp-ig .goal-banner .timeline { font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; color: #22A882; text-transform: uppercase;
  letter-spacing: 0.1em; white-space: nowrap; }
.idp-ig .goal-banner p { font-size: 14px; color: #A8B8CC; line-height: 1.65; }
.idp-ig .parent-note { margin-top: 1.5rem; border-left: 3px solid rgba(255,255,255,0.12);
  padding: 12px 18px; background: #243B55; border-radius: 0 10px 10px 0; }
.idp-ig .parent-note .plabel { font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: #64748B; margin-bottom: 7px; }
.idp-ig .parent-note p { font-size: 13px; color: #A8B8CC; line-height: 1.7; font-style: italic; }

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .topnav, .idp-meta { display: none !important; }
  body { background: #0D1B2A; }
  .idp-ig { border-radius: 0; }
}
@media (max-width: 768px) {
  .idp-ig .stats-row { grid-template-columns: 1fr 1fr; }
  .idp-ig .card-grid  { grid-template-columns: 1fr; }
  .idp-ig .micro-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">Player <span>IDP</span></div>
  <div class="nav-right">
    <span class="nav-name" id="navName"></span>
    <button class="nav-btn" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div id="pageContent">
    <div class="spinner-wrap"><div class="spinner-lg"></div></div>
  </div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');

(async () => {
  // Must be logged in (as any role — parent or coach)
  const ctx = await requireParent();
  if (!ctx) return;

  const { session, profile } = ctx;
  document.getElementById('navName').textContent = profile?.full_name || session.user.email;

  // If a token is in the URL, process the invite first
  if (token) {
    await acceptInvite(session.user.id, token);
    // Clean token from URL without reload
    window.history.replaceState({}, '', '/parent.html');
  }

  loadIDPs(session.user.id);
})();

async function acceptInvite(userId, inviteToken) {
  // Find the parent_players row with this token
  const { data: row, error } = await sb
    .from('parent_players')
    .select('id, accepted, parent_id')
    .eq('invite_token', inviteToken)
    .maybeSingle();

  if (!row) return; // Token not found — ignore silently

  // If already accepted by someone else, don't overwrite
  if (row.accepted && row.parent_id && row.parent_id !== userId) {
    showMessage('This invite link has already been used.', 'warning');
    return;
  }

  // Accept
  await sb
    .from('parent_players')
    .update({ parent_id: userId, accepted: true })
    .eq('id', row.id);
}

async function loadIDPs(userId) {
  const container = document.getElementById('pageContent');

  // Get all players this parent is linked to (deduplicate by player_id)
  const { data: rawLinks } = await sb
    .from('parent_players')
    .select('player_id, players(id, name, positions)')
    .eq('parent_id', userId)
    .eq('accepted', true);
  // Deduplicate — same player may have multiple invite rows
  const seen = new Set();
  const links = (rawLinks || []).filter(l => {
    if (seen.has(l.player_id)) return false;
    seen.add(l.player_id); return true;
  });

  if (!links || links.length === 0) {
    container.innerHTML = `
      <div class="page-header">
        <div class="page-title">Parent Portal</div>
      </div>
      <div class="info-card">
        <div class="icon">👋</div>
        <h2>Welcome to Player IDP</h2>
        <p>You're not linked to any players yet. Here's how to get connected:</p>
        <div style="text-align:left;margin-top:1.25rem;display:flex;flex-direction:column;gap:12px;">
          <div style="display:flex;align-items:flex-start;gap:12px;font-size:13px;color:var(--text-muted);line-height:1.6;">
            <span style="background:var(--teal-faint);border:1px solid rgba(27,138,107,.35);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--teal-light);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;flex-shrink:0;margin-top:1px;">1</span>
            <span>Ask your coach to open the team page, click <strong style="color:var(--text);">👤 Link Parent</strong> next to your player, and send you the invite link.</span>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;font-size:13px;color:var(--text-muted);line-height:1.6;">
            <span style="background:var(--teal-faint);border:1px solid rgba(27,138,107,.35);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--teal-light);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;flex-shrink:0;margin-top:1px;">2</span>
            <span>Click the link they send. You'll be automatically connected to your player's account — no extra steps needed.</span>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;font-size:13px;color:var(--text-muted);line-height:1.6;">
            <span style="background:var(--teal-faint);border:1px solid rgba(27,138,107,.35);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--teal-light);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;flex-shrink:0;margin-top:1px;">3</span>
            <span>Their published development plans will appear here. You can view, print, or save them as PDF any time.</span>
          </div>
        </div>
      </div>`;
    return;
  }

  // Fetch published IDPs for all linked players
  const playerIds = links.map(l => l.player_id);
  const { data: idps } = await sb
    .from('idps')
    .select('*')
    .in('player_id', playerIds)
    .eq('published', true)
    .order('updated_at', { ascending: false });

  // Group ALL IDPs per player (sorted newest first — already ordered by updated_at desc)
  const idpsByPlayer = {};
  (idps || []).forEach(i => {
    if (!idpsByPlayer[i.player_id]) idpsByPlayer[i.player_id] = [];
    idpsByPlayer[i.player_id].push(i);
  });

  let html = `
    <div class="page-header">
      <div class="page-title">Player Development Plans</div>
      <div class="page-subtitle">Published by your coaching staff</div>
    </div>`;

  links.forEach((link, playerIdx) => {
    const player   = link.players;
    const playerIDPs = idpsByPlayer[player.id] || [];

    if (playerIDPs.length === 0) {
      html += `
        <div class="idp-section">
          <div class="idp-meta">
            <strong style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;">${esc(player.name)}</strong>
            ${player.positions ? `<span style="font-size:13px;color:var(--text-dim);margin-left:10px;">${esc(player.positions)}</span>` : ''}
          </div>
          <div class="info-card">
            <div class="icon">⏳</div>
            <h2>IDP coming soon</h2>
            <p>Your coach hasn't published an IDP for ${esc(player.name)} yet.</p>
          </div>
        </div>`;
      return;
    }

    const firstIDP = playerIDPs[0];
    const firstDate = new Date(firstIDP.updated_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    // Build date tabs if multiple IDPs
    const tabsHTML = playerIDPs.length > 1 ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">
        ${playerIDPs.map((idp, i) => `
          <button onclick="switchIDP(${playerIdx}, ${i})" id="ptab-${playerIdx}-${i}"
            style="padding:6px 12px;border-radius:7px;border:1px solid ${i===0?'rgba(27,138,107,.5)':'rgba(255,255,255,.12)'};
            background:${i===0?'rgba(27,138,107,.12)':'#1A2E44'};color:${i===0?'#22A882':'#94A3B8'};
            font-size:11px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;
            letter-spacing:.06em;text-transform:uppercase;">
            ${new Date(idp.updated_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
          </button>`).join('')}
      </div>` : '';

    html += `
      <div class="idp-section">
        <div class="idp-meta">
          <div>
            <strong style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;">${esc(player.name)}</strong>
            ${player.positions ? `<span style="font-size:13px;color:var(--text-dim);margin-left:10px;">${esc(player.positions)}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="idp-date" id="pdate-${playerIdx}">Last updated ${firstDate}</span>
            <span class="idp-badge">✓ Published</span>
            <button class="btn-print" onclick="window.print()">⬒ Save as PDF</button>
          </div>
        </div>
        ${tabsHTML}
        <div id="pidp-${playerIdx}" class="idp-ig">${buildInfographicHTML(firstIDP.data)}</div>
      </div>`;
  });

  container.innerHTML = html;

  // Store IDP data for tab switching
  window._parentIDPs = links.map(l => idpsByPlayer[l.player_id] || []);
}

function switchIDP(playerIdx, idpIdx) {
  const playerIDPs = window._parentIDPs[playerIdx];
  if (!playerIDPs) return;
  const idp = playerIDPs[idpIdx];
  if (!idp) return;

  // Update display
  document.getElementById(`pidp-${playerIdx}`).innerHTML = buildInfographicHTML(idp.data);
  const date = new Date(idp.updated_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  const dateEl = document.getElementById(`pdate-${playerIdx}`);
  if (dateEl) dateEl.textContent = `Last updated ${date}`;

  // Update tab styles
  playerIDPs.forEach((_, i) => {
    const tab = document.getElementById(`ptab-${playerIdx}-${i}`);
    if (!tab) return;
    tab.style.borderColor   = i === idpIdx ? 'rgba(27,138,107,.5)' : 'rgba(255,255,255,.12)';
    tab.style.background    = i === idpIdx ? 'rgba(27,138,107,.12)' : '#1A2E44';
    tab.style.color         = i === idpIdx ? '#22A882' : '#94A3B8';
  });
}

function buildInfographicHTML(d) {
  const strengthCards = (d.strengths||[]).map(s => `<div class="card green"><h4><span class="dot" style="background:#38A050;"></span>${esc(s.title)}</h4><p>${esc(s.body)}</p></div>`).join('');
  const improvCards   = (d.improvements||[]).map(s => `<div class="card amber"><h4><span class="dot" style="background:#F0A020;"></span>${esc(s.title)}</h4><p>${esc(s.body)}</p></div>`).join('');
  const planRows      = (d.plan||[]).map(p => `<div class="plan-item"><div class="plan-badge ${p.badgeType||'purple'}">${esc(p.badge)}</div><div class="plan-content"><h4>${esc(p.title)}</h4><ul>${(p.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div></div>`).join('');
  const microCards    = (d.microHabits||[]).map(m => `<div class="micro-card"><div class="num">${esc(m.num)}</div><div class="desc">${esc(m.desc)}</div></div>`).join('');
  const gdParts = (d.gameDayFocus||'').split('—');
  const gdText  = gdParts.length > 1 ? `<span>${esc(gdParts[0].trim())}</span> — ${esc(gdParts[1].trim())}` : esc(d.gameDayFocus||'');

  return `
    <div class="ig-header">
      <div><h1>${esc(d.playerName||'Player')} <span>IDP</span></h1><div class="sub">Individual Development Plan · 2026 · Coaching Staff</div></div>
      <div style="text-align:right;"><div class="pos-badge">${esc(d.position||'Field Player')}</div><span class="phase">Phase: ${esc(d.focus||'Development')}</span></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="val">Development</div><div class="lbl">Current phase</div></div>
      <div class="stat-card"><div class="val">${esc(d.focus||'—')}</div><div class="lbl">Focus</div></div>
      <div class="stat-card"><div class="val">${esc(d.duration||'12 months')}</div><div class="lbl">Plan duration</div></div>
      <div class="stat-card"><div class="val">${esc(d.mantra||'Play with intent')}</div><div class="lbl">Mantra</div></div>
    </div>
    <div class="sec-label">Keep doing — strengths to build on</div>
    <div class="card-grid">${strengthCards}</div>
    <hr class="divider">
    <div class="sec-label">Areas to improve</div>
    <div class="card-grid">${improvCards}</div>
    <hr class="divider">
    <div class="sec-label">Development plan</div>
    <div class="plan-list">${planRows}</div>
    <div class="micro-label">Home micro-habits — daily</div>
    <div class="micro-grid">${microCards}</div>
    <div class="gameday" style="margin-top:8px;">
      <div class="gd-label">Game day focus</div>
      <div class="gd-text">${gdText}</div>
    </div>
    <div class="sec-label" style="margin-top:1.5rem;">12-month goal</div>
    <div class="goal-banner">
      <div class="timeline">12-month<br>vision</div>
      <p>${esc(d.goalVision||'')}</p>
    </div>
    <div class="parent-note">
      <div class="plabel">Note for parents</div>
      <p>${esc(d.parentNote||'')}</p>
    </div>`;
}

function showMessage(msg, type) {
  console.log(`[${type}] ${msg}`);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
