<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Player Development</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-mid: #1A2E44; --navy-light: #243B55;
  --teal: #1B8A6B; --teal-light: #22A882; --teal-faint: #0D2E25;
  --amber: #D4870A; --amber-light: #F0A020; --amber-faint: #2E1E05;
  --text: #EDF2F7; --text-muted: #94A3B8; --text-dim: #64748B;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --red-light: #E05050;
}
html, body { min-height: 100vh; background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; }

.page { max-width: 800px; margin: 0 auto; padding: 2.5rem 2rem; }
.page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: .25rem; }
.page-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 2rem; }

/* Stat pills */
.stat-row { display: flex; gap: 12px; margin-bottom: 2rem; flex-wrap: wrap; }
.stat-pill {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 12px 18px; display: flex; flex-direction: column; gap: 2px;
  min-width: 100px;
}
.stat-pill .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: var(--teal-light); }
.stat-pill .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }

/* Settings sections */
.settings-section {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 1.75rem; margin-bottom: 1.5rem;
}
.section-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; gap: 1rem; }
.section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; }
.section-desc { font-size: 13px; color: var(--text-dim); margin-top: 2px; line-height: 1.5; }

/* Tabs */
.tab-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--navy-mid); border: 1px solid var(--border-strong); border-radius: 10px; padding: 4px; }
.tab-btn {
  flex: 1; padding: 8px 16px; border-radius: 7px; border: none; background: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim);
  cursor: pointer; transition: background .15s, color .15s;
}
.tab-btn.active { background: var(--teal-faint); color: var(--teal-light); }
.tab-btn:hover:not(.active) { color: var(--text-muted); background: rgba(255,255,255,.03); }

/* Btn */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px; border-radius: 8px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: var(--teal-light); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
.btn-ghost:hover { color: var(--text-muted); }
.btn-danger-sm {
  padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; cursor: pointer;
  background: transparent; border: 1px solid rgba(224,80,80,.25); color: #E05050;
  font-family: 'Barlow Condensed', sans-serif; transition: border-color .15s;
}
.btn-danger-sm:hover { border-color: rgba(224,80,80,.5); }

/* Search bar */
.search-row { display: flex; gap: 10px; margin-bottom: 1rem; align-items: center; }
.search-input {
  background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 9px 13px; flex: 1; outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--teal); }
.search-input::placeholder { color: var(--text-dim); }

/* User table */
.user-table { width: 100%; border-collapse: collapse; }
.user-table th {
  text-align: left; font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .09em; padding: 0 12px 10px;
  border-bottom: 1px solid var(--border-strong);
}
.user-row { border-bottom: 1px solid var(--border); transition: background .12s; }
.user-row:last-child { border-bottom: none; }
.user-row:hover { background: rgba(255,255,255,.02); }
.user-row td { padding: 12px; vertical-align: middle; }
.user-email { font-size: 13px; color: var(--text); }
.user-name-sm { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
.role-select {
  background: var(--navy); border: 1px solid var(--border-strong); border-radius: 6px;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px;
  padding: 5px 8px; cursor: pointer; outline: none; transition: border-color .2s;
}
.role-select:focus { border-color: var(--teal); }
.role-badge {
  display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; padding: 2px 7px; border-radius: 3px;
}
.role-badge.admin  { background: rgba(212,135,10,.2);  color: #F0A020; }
.role-badge.coach  { background: rgba(27,138,107,.2);  color: #22A882; }
.role-badge.parent { background: rgba(100,116,139,.2); color: #94A3B8; }
.empty-state { text-align: center; padding: 2.5rem; color: var(--text-dim); font-size: 13px; }

/* Invite link box */
.invite-link-box {
  background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 10px 13px; font-size: 12px;
  font-family: monospace; color: var(--text-muted); word-break: break-all;
  line-height: 1.5;
}
/* Pending invites table */
.invite-table { width: 100%; border-collapse: collapse; }
.invite-table th {
  text-align: left; font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .09em; padding: 0 10px 8px;
  border-bottom: 1px solid var(--border-strong);
}
.invite-table td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.invite-table tr:last-child td { border-bottom: none; }
.chip {
  display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; padding: 2px 8px; border-radius: 3px;
}
.chip-used    { background: rgba(27,138,107,.2);   color: #22A882; }
.chip-pending { background: rgba(212,135,10,.2);   color: #F0A020; }

/* Overlay / modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 300;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 2rem; width: 100%; max-width: 440px;
  display: flex; flex-direction: column; gap: 16px;
}
.modal h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 0; }
.field label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
.modal input[type="text"], .modal input[type="email"] {
  background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 10px 13px; width: 100%; outline: none;
  transition: border-color .2s;
}
.modal input:focus { border-color: var(--teal); }
.modal input::placeholder { color: var(--text-dim); }
select.inv-role-select {
  background: var(--navy); border: 1px solid var(--border-strong); border-radius: 8px;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
  padding: 10px 13px; width: 100%; outline: none; transition: border-color .2s;
}
select.inv-role-select:focus { border-color: var(--teal); }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; padding: 11px 16px; }
.modal-status { font-size: 12px; min-height: 16px; }
.modal-status.ok  { color: var(--teal-light); }
.modal-status.err { color: var(--red-light); }

/* Access denied */
.access-denied { text-align: center; padding: 5rem 2rem; color: var(--text-dim); }
.access-denied h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: .5rem; }
.access-denied p { font-size: 14px; margin-bottom: 1.5rem; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Role filter pills */
.filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-pill {
  padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-strong);
  background: none; color: var(--text-dim); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif;
}
.filter-pill:hover { color: var(--text-muted); border-color: var(--text-dim); }
.filter-pill.active { background: var(--teal-faint); border-color: var(--teal); color: var(--teal-light); }

@media (max-width: 640px) {
  .page { padding: 1.5rem 1rem; }
  .stat-row { gap: 8px; }
  .stat-pill { padding: 10px 14px; }
  .user-table th:nth-child(3),
  .user-row td:nth-child(3) { display: none; }
}
</style>
</head>
<body>

<!-- ADD USER MODAL -->
<div class="overlay" id="addUserModal">
  <div class="modal">
    <h2>Invite User</h2>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="inviteName" placeholder="Jane Smith" />
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="inviteEmail" placeholder="jane@example.com" />
    </div>

    <div class="field">
      <label>Role</label>
      <select id="inviteRole" class="inv-role-select">
        <option value="coach">Coach — manage teams &amp; players</option>
        <option value="admin">Admin — full access including Settings</option>
        <option value="parent">Parent — read-only IDP view</option>
      </select>
    </div>

    <!-- Shown after invite is created -->
    <div id="inviteLinkSection" style="display:none;">
      <div class="field">
        <label>Invite Link</label>
        <div class="invite-link-box" id="inviteLinkBox"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn btn-primary" onclick="copyInviteLink()" style="flex:1;">Copy Link</button>
        <button class="btn btn-ghost" onclick="sendInviteEmail()" style="flex:1;">Open Email App</button>
      </div>
    </div>

    <div class="modal-actions" id="inviteActions">
      <button class="btn btn-ghost" onclick="closeAddUser()">Cancel</button>
      <button class="btn btn-primary" id="createInviteBtn" onclick="createInvite()">Send Invite</button>
    </div>
    <div class="modal-status" id="inviteStatus"></div>
  </div>
</div>

<div id="sidebarMount"></div>

<div class="main-content">
<div class="page" id="pageContent">
  <div style="color:var(--text-dim);padding:3rem;text-align:center;">Loading…</div>
</div>
</div>

<script>
let coachId = null;
let allUsers = [];
let allInvites = [];
let activeFilter = 'all';
let activeTab = 'users';

(async () => {
  const ctx = await requireCoach();
  if (!ctx) return;
  coachId = ctx.session.user.id;

  await renderSidebar('users');

  if (ctx.profile.role !== 'admin') {
    document.getElementById('pageContent').innerHTML = `
      <div class="access-denied">
        <h2>Access Restricted</h2>
        <p>Only admins can access User Management. Contact your club admin to change your role.</p>
        <a href="/dashboard.html" class="btn btn-primary" style="text-decoration:none;display:inline-flex;">← Back to Dashboard</a>
      </div>`;
    return;
  }

  // Load all users and invites
  const [{ data: users }, { data: invites }] = await Promise.all([
    sb.from('profiles').select('id, full_name, role, email').order('full_name'),
    sb.from('invites').select('id, role, email, label, used_at, created_at').order('created_at', { ascending: false }).limit(50),
  ]);

  allUsers   = users   || [];
  allInvites = invites || [];

  renderPage();
})();

function renderPage() {
  const adminCount  = allUsers.filter(u => u.role === 'admin').length;
  const coachCount  = allUsers.filter(u => u.role === 'coach').length;
  const parentCount = allUsers.filter(u => u.role === 'parent').length;
  const pendingCount = allInvites.filter(i => !i.used_at).length;

  document.getElementById('pageContent').innerHTML = `
    <div class="page-title">Users</div>
    <div class="page-subtitle">Manage who has access to the portal and their roles.</div>

    <div class="stat-row">
      <div class="stat-pill"><div class="stat-num">${allUsers.length}</div><div class="stat-label">Total Users</div></div>
      <div class="stat-pill"><div class="stat-num" style="color:#F0A020;">${adminCount}</div><div class="stat-label">Admins</div></div>
      <div class="stat-pill"><div class="stat-num">${coachCount}</div><div class="stat-label">Coaches</div></div>
      <div class="stat-pill"><div class="stat-num" style="color:#94A3B8;">${parentCount}</div><div class="stat-label">Parents</div></div>
      <div class="stat-pill"><div class="stat-num" style="color:#F0A020;">${pendingCount}</div><div class="stat-label">Pending Invites</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn ${activeTab === 'users' ? 'active' : ''}" onclick="switchTab('users')">👥 Users (${allUsers.length})</button>
      <button class="tab-btn ${activeTab === 'invites' ? 'active' : ''}" onclick="switchTab('invites')">✉️ Invites (${allInvites.length})</button>
    </div>

    <div id="tabUsers" style="display:${activeTab === 'users' ? 'block' : 'none'}">
      <div class="settings-section">
        <div class="section-header">
          <div>
            <div class="section-title">Registered Users</div>
            <div class="section-desc">All accounts with portal access. Role changes take effect on next login.</div>
          </div>
          <button class="btn btn-primary" onclick="openAddUser()" style="flex-shrink:0;">+ Invite User</button>
        </div>

        <div class="search-row">
          <input class="search-input" id="userSearch" type="text" placeholder="Search by name or email…" oninput="filterUsers()" />
        </div>

        <div class="filter-row">
          <button class="filter-pill ${activeFilter === 'all'    ? 'active' : ''}" onclick="setFilter('all')">All</button>
          <button class="filter-pill ${activeFilter === 'admin'  ? 'active' : ''}" onclick="setFilter('admin')">Admin</button>
          <button class="filter-pill ${activeFilter === 'coach'  ? 'active' : ''}" onclick="setFilter('coach')">Coach</button>
          <button class="filter-pill ${activeFilter === 'parent' ? 'active' : ''}" onclick="setFilter('parent')">Parent</button>
        </div>

        <div id="userTableWrap">${buildUserTable(allUsers)}</div>

        <div style="font-size:12px;color:var(--text-dim);margin-top:12px;line-height:1.6;">
          <strong>Admin</strong> — full access including Settings &amp; Users.&nbsp;
          <strong>Coach</strong> — manage teams &amp; players.&nbsp;
          <strong>Parent</strong> — read-only IDP view.
        </div>
      </div>
    </div>

    <div id="tabInvites" style="display:${activeTab === 'invites' ? 'block' : 'none'}">
      <div class="settings-section">
        <div class="section-header">
          <div>
            <div class="section-title">Invite History</div>
            <div class="section-desc">All invite links sent. Pending invites haven't been used yet.</div>
          </div>
          <button class="btn btn-primary" onclick="openAddUser()" style="flex-shrink:0;">+ New Invite</button>
        </div>

        ${buildInviteTable(allInvites)}
      </div>
    </div>
  `;
}

function buildUserTable(users) {
  const query = (document.getElementById('userSearch')?.value || '').toLowerCase();
  let filtered = users;
  if (activeFilter !== 'all') filtered = filtered.filter(u => u.role === activeFilter);
  if (query) filtered = filtered.filter(u =>
    (u.full_name || '').toLowerCase().includes(query) ||
    (u.email || '').toLowerCase().includes(query)
  );

  if (filtered.length === 0) {
    return `<div class="empty-state">No users match your filter.</div>`;
  }

  return `
    <table class="user-table">
      <thead>
        <tr>
          <th>Name / Email</th>
          <th>Current Role</th>
          <th>Change Role</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(u => `
          <tr class="user-row">
            <td>
              <div class="user-email">${esc(u.full_name || 'Unnamed User')}</div>
              <div class="user-name-sm">${esc(u.email || '—')}</div>
            </td>
            <td><span class="role-badge ${u.role}">${u.role}</span></td>
            <td>
              <select class="role-select" data-uid="${u.id}" onchange="changeRole(this)">
                <option value="admin"  ${u.role==='admin'  ? 'selected':''}>Admin</option>
                <option value="coach"  ${u.role==='coach'  ? 'selected':''}>Coach</option>
                <option value="parent" ${u.role==='parent' ? 'selected':''}>Parent</option>
              </select>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function buildInviteTable(invites) {
  if (!invites || invites.length === 0) {
    return `<div class="empty-state">No invites yet. Use <strong>+ New Invite</strong> to invite coaches, admins, or parents.</div>`;
  }
  return `
    <table class="invite-table">
      <thead>
        <tr>
          <th>Name / Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        ${invites.map(inv => {
          const d = new Date(inv.created_at);
          const dateStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
          return `
            <tr>
              <td>
                <div style="font-size:13px;color:var(--text);">${esc(inv.label || '—')}</div>
                <div style="font-size:12px;color:var(--text-dim);">${esc(inv.email || '—')}</div>
              </td>
              <td><span class="role-badge ${inv.role}">${inv.role}</span></td>
              <td>${inv.used_at
                ? '<span class="chip chip-used">Used</span>'
                : '<span class="chip chip-pending">Pending</span>'}</td>
              <td style="font-size:12px;color:var(--text-dim);white-space:nowrap;">${dateStr}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function switchTab(tab) {
  activeTab = tab;
  renderPage();
}

function setFilter(f) {
  activeFilter = f;
  const wrap = document.getElementById('userTableWrap');
  if (wrap) wrap.innerHTML = buildUserTable(allUsers);
  // Re-render filter pills
  document.querySelectorAll('.filter-pill').forEach(el => {
    const isActive = el.textContent.toLowerCase().startsWith(f === 'all' ? 'all' : f);
    el.classList.toggle('active', isActive);
  });
}

function filterUsers() {
  const wrap = document.getElementById('userTableWrap');
  if (wrap) wrap.innerHTML = buildUserTable(allUsers);
}

// ── Add User modal ────────────────────────────
let _inviteLink = '';
let _inviteEmailVal = '';
let _inviteNameVal  = '';

function openAddUser() {
  _inviteLink = '';
  document.getElementById('inviteName').value  = '';
  document.getElementById('inviteEmail').value = '';
  document.getElementById('inviteRole').value  = 'coach';
  document.getElementById('inviteLinkSection').style.display = 'none';
  document.getElementById('inviteActions').style.display     = 'flex';
  document.getElementById('inviteStatus').textContent        = '';
  document.getElementById('addUserModal').classList.add('open');
  setTimeout(() => document.getElementById('inviteName').focus(), 80);
}

function closeAddUser() {
  document.getElementById('addUserModal').classList.remove('open');
  if (_inviteLink) {
    // Refresh invite list
    sb.from('invites')
      .select('id, role, email, label, used_at, created_at')
      .order('created_at', { ascending: false })
      .limit(50)
      .then(({ data }) => {
        allInvites = data || [];
        renderPage();
      });
  }
}

async function createInvite() {
  const name  = document.getElementById('inviteName').value.trim();
  const email = document.getElementById('inviteEmail').value.trim();
  const role  = document.getElementById('inviteRole').value;
  const st    = document.getElementById('inviteStatus');

  if (!name)  { st.textContent = 'Please enter a name.';  st.className = 'modal-status err'; return; }
  if (!email) { st.textContent = 'Please enter an email.'; st.className = 'modal-status err'; return; }

  const btn = document.getElementById('createInviteBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { data: invite, error } = await sb
    .from('invites')
    .insert({ role, email: email.toLowerCase(), label: name, created_by: coachId })
    .select('token')
    .single();

  btn.disabled = false;
  btn.textContent = 'Send Invite';

  if (error) {
    st.textContent = 'Error: ' + error.message;
    st.className = 'modal-status err';
    return;
  }

  _inviteLink     = `${location.origin}/login.html?invite=${invite.token}`;
  _inviteEmailVal = email;
  _inviteNameVal  = name;

  document.getElementById('inviteLinkBox').textContent       = _inviteLink;
  document.getElementById('inviteLinkSection').style.display = 'block';
  document.getElementById('inviteActions').style.display     = 'none';
  st.textContent = 'Invite created! Copy the link or use Open Email App.';
  st.className   = 'modal-status ok';
}

function copyInviteLink() {
  navigator.clipboard.writeText(_inviteLink).then(() => {
    const st = document.getElementById('inviteStatus');
    st.textContent = 'Copied to clipboard!';
    st.className   = 'modal-status ok';
  });
}

function sendInviteEmail() {
  const role    = document.getElementById('inviteRole').value;
  const clubName = window._clubName || 'Player Development';
  const subject = encodeURIComponent(`You're invited to ${clubName}`);
  const body    = encodeURIComponent(
    `Hi ${_inviteNameVal},\n\nYou've been invited to join ${clubName} as a ${role}.\n\nClick the link below to create your account:\n\n${_inviteLink}\n\nThis link is unique to you — please don't share it.\n\nWelcome aboard!`
  );
  window.open(`mailto:${_inviteEmailVal}?subject=${subject}&body=${body}`);
}

// Close modal on backdrop click
document.getElementById('addUserModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddUser();
});

// ── Role change ───────────────────────────────
async function changeRole(select) {
  const uid  = select.dataset.uid;
  const role = select.value;
  const prev = select.dataset.prev || select.options[select.selectedIndex === 0 ? 1 : 0].value;
  const { error } = await sb.from('profiles').update({ role }).eq('id', uid);
  if (error) {
    alert('Error updating role: ' + error.message);
    select.value = prev;
  } else {
    // Update in-memory list and re-render badge
    const u = allUsers.find(u => u.id === uid);
    if (u) u.role = role;
    const badge = select.closest('tr').querySelector('.role-badge');
    if (badge) { badge.className = `role-badge ${role}`; badge.textContent = role; }
    // Update stat pills
    const adminCount  = allUsers.filter(u => u.role === 'admin').length;
    const coachCount  = allUsers.filter(u => u.role === 'coach').length;
    const parentCount = allUsers.filter(u => u.role === 'parent').length;
  }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
