<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Player IDP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">`n<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>`n<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-mid: #1A2E44; --navy-light: #243B55;
  --teal: #1B8A6B; --teal-light: #22A882; --teal-faint: #0D2E25;
  --amber: #D4870A; --amber-light: #F0A020; --amber-faint: #2E1E05;
  --text: #EDF2F7; --text-muted: #94A3B8; --text-dim: #64748B;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --red-light: #E05050;
}
html, body { min-height: 100vh; background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; }

.page { max-width: 760px; margin: 0 auto; padding: 2.5rem 2rem; }
.page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 2rem; }

/* Settings sections */
.settings-section {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 1.75rem; margin-bottom: 1.5rem;
}
.section-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; gap: 1rem; }
.section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; }
.section-desc { font-size: 13px; color: var(--text-dim); margin-top: 2px; line-height: 1.5; }

/* Fields */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
input[type="text"], input[type="password"], input[type="number"] {
  background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 10px 13px; width: 100%; outline: none;
  transition: border-color .2s;
}
input:focus { border-color: var(--teal); }
input::placeholder { color: var(--text-dim); }
.field-hint { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* Logo upload */
.logo-row { display: flex; align-items: center; gap: 1.25rem; }
.logo-preview {
  width: 72px; height: 72px; border-radius: 12px; flex-shrink: 0;
  background: var(--navy); border: 2px dashed var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer; transition: border-color .2s;
}
.logo-preview:hover { border-color: var(--teal); }
.logo-preview img { width: 100%; height: 100%; object-fit: cover; }
.logo-preview .logo-placeholder { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.4; padding: 6px; }
.logo-upload-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 7px; font-size: 13px; font-weight: 600;
  background: var(--navy); border: 1px solid var(--border-strong); color: var(--text-muted);
  cursor: pointer; transition: border-color .2s, color .2s;
}
.logo-upload-btn:hover { border-color: var(--teal); color: var(--text); }
#logoFileInput { display: none; }

/* Save button */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px; border-radius: 8px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: var(--teal-light); }
.btn-danger-sm {
  padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; cursor: pointer;
  background: transparent; border: 1px solid rgba(224,80,80,.25); color: #E05050;
  font-family: 'Barlow Condensed', sans-serif; transition: border-color .15s;
}
.btn-danger-sm:hover { border-color: rgba(224,80,80,.5); }
.save-row { display: flex; align-items: center; gap: 12px; margin-top: 18px; }
.save-status { font-size: 13px; }
.save-status.ok { color: var(--teal-light); }
.save-status.err { color: var(--red-light); }

/* Overlay / modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 300;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--navy-mid); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 2rem; width: 100%; max-width: 440px;
  display: flex; flex-direction: column; gap: 16px;
}
.modal h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; }
.modal input[type="text"], .modal input[type="email"] {
  background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 10px 13px; width: 100%; outline: none;
  transition: border-color .2s;
}
.modal input:focus { border-color: var(--teal); }
.modal input::placeholder { color: var(--text-dim); }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; padding: 11px 16px; }
.modal-status { font-size: 12px; min-height: 16px; }
.modal-status.ok  { color: var(--teal-light); }
.modal-status.err { color: var(--red-light); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
.btn-ghost:hover { color: var(--text-muted); }

/* Key field */
.key-row { display: flex; gap: 8px; align-items: stretch; }
.key-row input { flex: 1; }
.toggle-key {
  background: var(--navy); border: 1px solid var(--border-strong); border-radius: 8px;
  color: var(--text-dim); font-size: 12px; padding: 0 12px; cursor: pointer;
  flex-shrink: 0; transition: border-color .2s; white-space: nowrap;
}
.toggle-key:hover { border-color: var(--teal); }

/* ─── THEME COLOR PICKER ─── */
.color-swatches { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
.swatch-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.color-swatch {
  width: 36px; height: 36px; border-radius: 9px; cursor: pointer;
  border: 2px solid transparent; transition: transform .15s, border-color .15s, box-shadow .15s;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.active { border-color: #fff; transform: scale(1.12); box-shadow: 0 0 0 3px rgba(255,255,255,.12); }
.swatch-name { font-size: 9px; color: var(--text-dim); text-align: center; text-transform: uppercase; letter-spacing: .04em; }

.color-custom-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
input[type="color"].color-picker-input {
  width: 42px; height: 38px; border: 1px solid var(--border-strong);
  border-radius: 7px; padding: 2px; cursor: pointer; background: var(--navy);
}
.color-hex-input {
  width: 110px; background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 8px; color: var(--text); font-family: monospace;
  font-size: 13px; padding: 8px 12px; outline: none; transition: border-color .2s;
}
.color-hex-input:focus { border-color: var(--teal); }

.theme-preview {
  background: var(--navy); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 14px 16px; margin: 14px 0;
}
.preview-label {
  font-size: 10px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 12px;
}
.preview-items { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.preview-nav-item {
  display: flex; align-items: center; gap: 7px; padding: 7px 11px;
  border-radius: 7px; font-size: 12px; font-weight: 600;
  font-family: 'Inter', sans-serif; border: 1px solid;
}
.preview-btn {
  padding: 7px 16px; border-radius: 7px; border: none; color: #fff;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; cursor: default;
}
.preview-chip {
  display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: .06em; text-transform: uppercase; border: 1px solid;
}
.preview-text { font-size: 13px; font-weight: 600; }

/* Access denied */
.access-denied {
  text-align: center; padding: 5rem 2rem; color: var(--text-dim);
}
.access-denied h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: .5rem; }
.access-denied p { font-size: 14px; margin-bottom: 1.5rem; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── MY PROFILE ─── */
.avatar-upload-row { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 1.25rem; }
.avatar-circle {
  width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
  background: var(--teal-faint); border: 2px dashed var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer; transition: border-color .2s;
  font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700;
  color: var(--teal-light);
}
.avatar-circle:hover { border-color: var(--teal); }
.avatar-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
</style>
</head>
<body>

<div id="sidebarMount"></div>

<div class="main-content">
<div class="page" id="pageContent">
  <div style="color:var(--text-dim);padding:3rem;text-align:center;">Loading…</div>
</div>
</div>

<script>
let coachId = null;

(async () => {
  const ctx = await requireCoach();
  if (!ctx) return;
  coachId = ctx.session.user.id;

  await renderSidebar('settings');

  // ── My Profile — visible to ALL coaches ─────────────────────────────────
  const initials = (ctx.profile?.full_name || '?').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  const avatarInner = ctx.profile?.avatar_url
    ? `<img src="${ctx.profile.avatar_url}" alt="Avatar">`
    : initials;

  const profileHTML = `
    <div class="settings-section">
      <div class="section-header">
        <div>
          <div class="section-title">My Profile</div>
          <div class="section-desc">Your name and photo — visible to other coaches on the team page.</div>
        </div>
      </div>
      <div class="avatar-upload-row">
        <div class="avatar-circle" id="avatarCircle" onclick="document.getElementById('avatarFileInput').click()" title="Upload photo">
          ${avatarInner}
        </div>
        <div>
          <label class="logo-upload-btn" for="avatarFileInput">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 9V2M3 5l3.5-3.5L10 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10.5h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Upload Photo
          </label>
          <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)" />
          <div class="field-hint" style="margin-top:6px;">PNG or JPG, square recommended. Max 2MB.</div>
        </div>
      </div>
      <div class="field">
        <label>Display Name</label>
        <input type="text" id="profileName" value="${esc(ctx.profile?.full_name || '')}" placeholder="Your name" />
      </div>
      <div class="save-row">
        <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
        <span class="save-status" id="profileStatus"></span>
      </div>
    </div>`;

  if (ctx.profile.role !== 'admin') {
    document.getElementById('pageContent').innerHTML = `<div class="page-title">Settings</div>${profileHTML}`;
    return;
  }

  // Load current settings (admin only from here)
  const { data: rows } = await sb.from('settings').select('key,value');
  const S = {};
  (rows || []).forEach(r => S[r.key] = r.value);

  document.getElementById('pageContent').innerHTML = `
    <div class="page-title">Settings</div>

    ${profileHTML}

    <!-- ── CLUB INFO ── -->
    <div class="settings-section" id="clubSection">
      <div class="section-header">
        <div>
          <div class="section-title">Club Information</div>
          <div class="section-desc">Shown in the sidebar across the entire portal.</div>
        </div>
      </div>

      <div class="logo-row" style="margin-bottom:1.25rem;">
        <div class="logo-preview" id="logoPreview" onclick="document.getElementById('logoFileInput').click()">
          ${S.club_logo
            ? `<img id="logoImg" src="${S.club_logo}" alt="Club Logo">`
            : `<div class="logo-placeholder" id="logoImg">Click to upload</div>`}
        </div>
        <div>
          <label class="logo-upload-btn" for="logoFileInput">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 9V2M3 5l3.5-3.5L10 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10.5h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Upload Logo
          </label>
          <input type="file" id="logoFileInput" accept="image/*" onchange="handleLogoSelect(event)" />
          <div class="field-hint" style="margin-top:6px;">PNG or JPG, square recommended. Displayed at 36×36px.</div>
          ${S.club_logo ? `<button class="btn-danger-sm" style="margin-top:8px;" onclick="removeLogo()">Remove Logo</button>` : ''}
        </div>
      </div>

      <div class="field">
        <label>Club Name</label>
        <input type="text" id="clubName" value="${esc(S.club_name || '')}" placeholder="e.g. Barca Academy" />
      </div>

      <div class="field">
        <label>Default Season</label>
        <input type="text" id="defaultSeason" value="${esc(S.default_season || '')}" placeholder="e.g. Fall 2026" />
        <div class="field-hint">Pre-filled when creating new teams.</div>
      </div>

      <div class="save-row">
        <button class="btn btn-primary" onclick="saveClubInfo()">Save Club Info</button>
        <span class="save-status" id="clubStatus"></span>
      </div>
    </div>

    <!-- ── THEME COLORS ── -->
    <div class="settings-section">
      <div class="section-header">
        <div>
          <div class="section-title">Theme Colors</div>
          <div class="section-desc">Change the accent color site-wide to match your club's kit or branding. All users see this immediately.</div>
        </div>
      </div>

      <div class="field">
        <label>Preset Colors</label>
        <div class="color-swatches" id="colorSwatches"></div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label>Custom Color</label>
        <div class="color-custom-row">
          <input type="color" id="colorPickerInput" class="color-picker-input" value="#22A882" oninput="onColorPickerChange(this.value)" />
          <input type="text"  id="colorHexInput"    class="color-hex-input"    value="#22A882" placeholder="#RRGGBB" oninput="onHexInputChange(this.value)" maxlength="7" />
          <span style="font-size:12px;color:var(--text-dim);">Any hex color</span>
        </div>
        <div class="field-hint" style="margin-top:6px;">Light and dark variants are derived automatically from your chosen color.</div>
      </div>

      <div class="theme-preview">
        <div class="preview-label">Live Preview</div>
        <div class="preview-items" id="themePreviewItems"></div>
      </div>

      <div class="save-row">
        <button class="btn btn-primary" onclick="saveTheme()">Save Theme</button>
        <button class="btn btn-ghost" onclick="resetTheme()" style="border:1px solid var(--border-strong);">↺ Reset to Default</button>
        <span class="save-status" id="themeStatus"></span>
      </div>
    </div>

    <!-- ── AI SETTINGS ── -->
    <div class="settings-section">
      <div class="section-header">
        <div>
          <div class="section-title">AI Settings</div>
          <div class="section-desc">Claude API key used by all coaches to generate IDPs.</div>
        </div>
      </div>

      ${S.claude_api_key ? `
        <div style="background:var(--navy);border:1px solid var(--border-strong);border-radius:8px;padding:10px 13px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:13px;color:var(--text-muted);font-family:monospace;">
            ••••••••••••••••••••${esc(S.claude_api_key.slice(-4))}
          </span>
          <span style="font-size:11px;color:var(--teal-light);font-weight:700;">Key saved ✓</span>
        </div>
      ` : ''}
      <div class="field">
        <label>${S.claude_api_key ? 'Replace API Key' : 'Anthropic (Claude) API Key'}</label>
        <input type="password" id="claudeKey" placeholder="sk-ant-api03-… (paste new key to replace)" />
        <div class="field-hint">Get your key at <strong>console.anthropic.com</strong> → API Keys. Only the last 4 characters are shown for security.</div>
      </div>

      <div class="save-row">
        <button class="btn btn-primary" onclick="saveApiKey()">Save API Key</button>
        <span class="save-status" id="keyStatus"></span>
      </div>
    </div>

    <!-- ── IDP REVIEW ── -->
    <div class="settings-section">
      <div class="section-header">
        <div>
          <div class="section-title">IDP Review</div>
          <div class="section-desc">Flag players whose development plan hasn't been updated recently.</div>
        </div>
      </div>
      <div class="field">
        <label>Review Period (days)</label>
        <input type="number" id="idpReviewDays" value="${esc(S.idp_review_days || '60')}" min="1" max="365" placeholder="60" />
        <div class="field-hint">Players whose most recent IDP is older than this many days will be flagged as "Due for Review" on the team page and on the dashboard.</div>
      </div>
      <div class="save-row">
        <button class="btn btn-primary" onclick="saveReviewSettings()">Save Review Settings</button>
        <span class="save-status" id="reviewStatus"></span>
      </div>
    </div>

    <div style="background:var(--navy-mid);border:1px solid var(--border-strong);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text-muted);">User Management</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px;">Manage coaches, admins, and parents — and send invite links.</div>
      </div>
      <a href="/users.html" class="btn btn-primary" style="text-decoration:none;flex-shrink:0;">Manage Users →</a>
    </div>
  `;

  // Init theme picker with saved value
  initThemePicker(S.theme_primary || '#22A882');

  // Trigger tour for first-time admin
  maybeStartTour('settings');
})();

// ── Logo ──────────────────────────────────────
let pendingLogo = null;
function handleLogoSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 500 * 1024) {
    alert('Logo must be under 500KB. Please resize the image first.');
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    pendingLogo = ev.target.result;
    const preview = document.getElementById('logoPreview');
    preview.innerHTML = `<img id="logoImg" src="${pendingLogo}" alt="Club Logo">`;
    document.getElementById('clubStatus').textContent = 'Logo ready — click Save Club Info to apply.';
    document.getElementById('clubStatus').className = 'save-status ok';
  };
  reader.readAsDataURL(file);
}
function removeLogo() {
  pendingLogo = '';
  document.getElementById('logoPreview').innerHTML = `<div class="logo-placeholder" id="logoImg">Click to upload</div>`;
}

// ── Save club info ────────────────────────────
async function saveClubInfo() {
  const name   = document.getElementById('clubName').value.trim();
  const season = document.getElementById('defaultSeason').value.trim();
  const logo   = pendingLogo !== null ? pendingLogo : undefined;
  const st     = document.getElementById('clubStatus');
  st.textContent = '';

  const updates = [
    { key: 'club_name',      value: name   || '' },
    { key: 'default_season', value: season || '' },
  ];
  if (logo !== undefined) updates.push({ key: 'club_logo', value: logo });

  const { error } = await sb.from('settings').upsert(updates, { onConflict: 'key' });
  if (error) {
    st.textContent = 'Error: ' + error.message;
    st.className = 'save-status err';
  } else {
    try { sessionStorage.removeItem('idp_settings'); } catch(e) {}
    st.textContent = '✓ Saved!';
    st.className = 'save-status ok';
    pendingLogo = null;
    // Re-render sidebar immediately with new club name / logo
    if (window.renderSidebar) renderSidebar('settings');
  }
}

// ── IDP review period ─────────────────────────
async function saveReviewSettings() {
  const days = parseInt(document.getElementById('idpReviewDays').value) || 60;
  const st   = document.getElementById('reviewStatus');
  st.textContent = 'Saving…'; st.className = 'save-status';
  const { error } = await sb.from('settings').upsert([{ key: 'idp_review_days', value: String(days) }], { onConflict: 'key' });
  if (error) { st.textContent = 'Error: ' + error.message; st.className = 'save-status err'; }
  else { st.textContent = '✓ Saved!'; st.className = 'save-status ok'; setTimeout(() => st.textContent = '', 2500); }
}

// ── API key ───────────────────────────────────
async function saveApiKey() {
  const key = document.getElementById('claudeKey').value.trim();
  const st  = document.getElementById('keyStatus');
  if (!key) { st.textContent = 'Paste a new key to replace the existing one.'; st.className = 'save-status err'; return; }
  const { error } = await sb.from('settings').upsert([{ key: 'claude_api_key', value: key }], { onConflict: 'key' });
  if (error) {
    st.textContent = 'Error: ' + error.message;
    st.className = 'save-status err';
  } else {
    st.textContent = '✓ API key saved!';
    st.className = 'save-status ok';
  }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── My Profile ────────────────────────────────
async function handleAvatarUpload(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('Image must be under 2MB'); return; }

  const st = document.getElementById('profileStatus');
  st.textContent = 'Uploading…'; st.className = 'save-status';

  const ext  = file.name.split('.').pop().toLowerCase() || 'jpg';
  const path = `${coachId}/avatar.${ext}`;

  const { error: upErr } = await sb.storage
    .from('avatars')
    .upload(path, file, { upsert: true, contentType: file.type });

  if (upErr) { st.textContent = 'Upload failed: ' + upErr.message; st.className = 'save-status err'; return; }

  const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
  const avatarUrl = urlData.publicUrl + '?t=' + Date.now();

  const { error: dbErr } = await sb.from('profiles').update({ avatar_url: avatarUrl }).eq('id', coachId);
  if (dbErr) { st.textContent = 'Error: ' + dbErr.message; st.className = 'save-status err'; return; }

  const circle = document.getElementById('avatarCircle');
  if (circle) circle.innerHTML = `<img src="${avatarUrl}" alt="Avatar">`;
  st.textContent = '✓ Photo updated!'; st.className = 'save-status ok';
  setTimeout(() => st.textContent = '', 3000);
}

async function saveProfile() {
  const name = (document.getElementById('profileName')?.value || '').trim();
  const st   = document.getElementById('profileStatus');
  if (!name) { st.textContent = 'Name cannot be empty'; st.className = 'save-status err'; return; }
  const { error } = await sb.from('profiles').update({ full_name: name }).eq('id', coachId);
  if (error) { st.textContent = 'Error: ' + error.message; st.className = 'save-status err'; }
  else { st.textContent = '✓ Saved!'; st.className = 'save-status ok'; setTimeout(() => st.textContent = '', 2500); }
}

// ── Theme Color Picker ─────────────────────────────────────────────────────
const THEME_PRESETS = [
  { name: 'Forest',   hex: '#22A882' },
  { name: 'Royal',    hex: '#3B82F6' },
  { name: 'Crimson',  hex: '#EF4444' },
  { name: 'Violet',   hex: '#8B5CF6' },
  { name: 'Orange',   hex: '#F97316' },
  { name: 'Sky',      hex: '#06B6D4' },
  { name: 'Rose',     hex: '#F43F5E' },
  { name: 'Gold',     hex: '#EAB308' },
  { name: 'Slate',    hex: '#64748B' },
];

let _themeColor = '#22A882';

function initThemePicker(savedColor) {
  _themeColor = savedColor || '#22A882';
  const wrap = document.getElementById('colorSwatches');
  if (!wrap) return;

  wrap.innerHTML = THEME_PRESETS.map(p => {
    const isActive = p.hex.toLowerCase() === _themeColor.toLowerCase();
    return `<div class="swatch-wrap" onclick="selectSwatch('${p.hex}')">
      <div class="color-swatch${isActive ? ' active' : ''}"
           id="swatch-${p.hex.replace('#','')}"
           style="background:${p.hex};" title="${p.name}"></div>
      <span class="swatch-name">${p.name}</span>
    </div>`;
  }).join('');

  const picker = document.getElementById('colorPickerInput');
  const hexIn  = document.getElementById('colorHexInput');
  if (picker) picker.value = _themeColor;
  if (hexIn)  hexIn.value  = _themeColor;
  updateThemePreview(_themeColor);
}

function selectSwatch(hex) {
  _themeColor = hex;
  const picker = document.getElementById('colorPickerInput');
  const hexIn  = document.getElementById('colorHexInput');
  if (picker) picker.value = hex;
  if (hexIn)  hexIn.value  = hex;
  document.querySelectorAll('.color-swatch').forEach(el =>
    el.classList.toggle('active', el.style.background.toLowerCase() === hex.toLowerCase())
  );
  updateThemePreview(hex);
}

function onColorPickerChange(hex) {
  _themeColor = hex;
  const hexIn = document.getElementById('colorHexInput');
  if (hexIn) hexIn.value = hex;
  document.querySelectorAll('.color-swatch').forEach(el =>
    el.classList.toggle('active', el.style.background.toLowerCase() === hex.toLowerCase())
  );
  updateThemePreview(hex);
}

function onHexInputChange(val) {
  const hex = val.startsWith('#') ? val : '#' + val;
  if (!/^#[0-9a-f]{6}$/i.test(hex)) return;
  _themeColor = hex;
  const picker = document.getElementById('colorPickerInput');
  if (picker) picker.value = hex;
  document.querySelectorAll('.color-swatch').forEach(el =>
    el.classList.toggle('active', el.style.background.toLowerCase() === hex.toLowerCase())
  );
  updateThemePreview(hex);
}

function updateThemePreview(hex) {
  if (!window.deriveTheme) return;
  const { dark, light, faint } = window.deriveTheme(hex);
  const items = document.getElementById('themePreviewItems');
  if (!items) return;
  items.innerHTML = `
    <div class="preview-nav-item" style="background:${faint};color:${light};border-color:${faint};">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x=".5" y=".5" width="12" height="12" rx="2" stroke="${light}" stroke-width="1.2"/>
        <rect x="2.5" y="2.5" width="3" height="3" rx=".5" fill="${light}"/>
        <rect x="7.5" y="2.5" width="3" height="3" rx=".5" fill="${light}" opacity=".5"/>
        <rect x="2.5" y="7.5" width="3" height="3" rx=".5" fill="${light}" opacity=".5"/>
      </svg>
      Active Nav Item
    </div>
    <button class="preview-btn" style="background:${dark};">Primary Button</button>
    <span class="preview-chip" style="background:${faint};color:${light};border-color:${faint};">Published ✓</span>
    <span class="preview-text" style="color:${light};">Accent Text</span>
  `;
  // Live apply site-wide as you pick
  if (window.applyTheme) window.applyTheme(hex);
}

async function saveTheme() {
  const st = document.getElementById('themeStatus');
  st.textContent = 'Saving…'; st.className = 'save-status';
  const { error } = await sb.from('settings')
    .upsert([{ key: 'theme_primary', value: _themeColor }], { onConflict: 'key' });
  if (error) {
    st.textContent = 'Error: ' + error.message; st.className = 'save-status err';
  } else {
    try { sessionStorage.removeItem('idp_settings'); } catch(e) {}
    st.textContent = '✓ Theme saved! All users will see the new color on next load.';
    st.className = 'save-status ok';
    setTimeout(() => { st.textContent = ''; }, 3500);
  }
}

async function resetTheme() {
  selectSwatch('#22A882');
  const st = document.getElementById('themeStatus');
  st.textContent = 'Saving…'; st.className = 'save-status';
  const { error } = await sb.from('settings')
    .upsert([{ key: 'theme_primary', value: '#22A882' }], { onConflict: 'key' });
  if (error) {
    st.textContent = 'Error: ' + error.message; st.className = 'save-status err';
  } else {
    st.textContent = '✓ Reset to Forest Green.'; st.className = 'save-status ok';
    setTimeout(() => { st.textContent = ''; }, 2500);
  }
}
</script>
